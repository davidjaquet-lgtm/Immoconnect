<html lang="fr">

<style>
:root{--ink:#0F0F0E;--muted:#888780;--bg:#F5F2EC;--warm:#FEFDFB;--line:#E8E6E0;--gold:#C09B5A;--teal:#1E7A62;--blue:#185FA5;--r:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--ink);font-size:14px}
nav{background:#fff;border-bottom:1px solid var(--line);height:54px;display:flex;align-items:center;padding:0 32px;position:sticky;top:0;z-index:100}
.nav-logo{font-size:18px;font-weight:600;color:var(--ink);text-decoration:none}
.nav-logo span{color:var(--gold)}
.nav-links{display:flex;gap:20px;align-items:center;flex:1;margin-left:24px}
.nav-links a{text-decoration:none;color:var(--ink);font-size:13px}
.nav-links a:visited{color:var(--ink)}
.nav-links a:hover{color:var(--gold)}
.nav-link{color:var(--ink);text-decoration:none;font-size:13px;margin-right:18px}
.nav-link:visited{color:var(--ink)}
.nav-link:hover{color:var(--gold)}
.nav-gold{padding:7px 14px;background:var(--gold);color:var(--ink)!important;border-radius:4px;font-weight:500}
.nav-out{padding:7px 14px;border:1px solid var(--ink);color:var(--ink)!important;border-radius:4px;font-size:13px;text-decoration:none}
.nav-out:visited{color:var(--ink)!important}

.page{max-width:1040px;margin:0 auto;padding:32px 24px 80px}
.breadcrumb{font-size:12px;color:var(--muted);margin-bottom:20px}
.breadcrumb a{color:var(--muted);text-decoration:none}
.breadcrumb a:hover{color:var(--ink)}
.breadcrumb span{margin:0 6px}

/* LAYOUT */
.bien-layout{display:grid;grid-template-columns:1fr 340px;gap:24px;align-items:start}

/* GALERIE */
.galerie{border-radius:var(--r);overflow:hidden;margin-bottom:20px;position:relative}
.photo-main{width:100%;height:400px;object-fit:cover;background:var(--line);display:block}
.photo-main-placeholder{width:100%;height:400px;background:var(--line);display:flex;align-items:center;justify-content:center;font-size:48px}
.photos-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-top:4px}
.photo-thumb{width:100%;height:80px;object-fit:cover;cursor:pointer;transition:opacity .2s}
.photo-thumb:hover{opacity:.8}
.photo-wrap{position:relative}
.carousel-arrow{position:absolute;top:200px;transform:translateY(-50%);width:40px;height:40px;border:none;border-radius:50%;background:rgba(255,255,255,.92);color:#0F0F0E;font-size:26px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.18);z-index:6}
.ca-prev{left:12px}.ca-next{right:12px}
.carousel-arrow:hover{background:#fff}
.carousel-count{position:absolute;bottom:12px;right:12px;background:rgba(15,15,14,.7);color:#fff;font-size:12px;padding:4px 10px;border-radius:20px;z-index:6}
.simu-card{background:var(--warm);border:1px solid var(--line);border-radius:8px;padding:16px;margin-bottom:20px}
.simu-title{font-size:13px;font-weight:600;margin-bottom:12px}
.simu-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.simu-grid label{display:flex;flex-direction:column;font-size:11px;color:var(--muted);gap:4px}
.simu-grid input,.simu-grid select{padding:8px 10px;border:1px solid var(--line);border-radius:6px;font-family:inherit;font-size:13px;color:var(--ink);background:#fff}
.simu-zero{margin-top:8px;width:100%;padding:7px;border:1px dashed var(--line);background:#fff;border-radius:6px;font-family:inherit;font-size:12px;cursor:pointer;color:var(--muted)}
.simu-out{margin-top:12px;border-top:1px solid var(--line);padding-top:10px}
.simu-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:5px 0;color:var(--ink)}
.simu-row span{color:var(--muted)}
.simu-row.simu-hl strong{color:var(--teal);font-size:16px}
.simu-note{font-size:10px;color:var(--muted);margin-top:8px;line-height:1.5}
.simu-tabs{display:flex;gap:6px;margin-bottom:12px}
.simu-tab{flex:1;padding:8px;border:1px solid var(--line);background:#fff;border-radius:6px;font-family:inherit;font-size:12px;cursor:pointer;color:var(--muted)}
.simu-tab.active{background:var(--ink);color:#fff;border-color:var(--ink)}
.simu-card.mode-simple .simu-fisc{display:none}
.niveau-badge{position:absolute;top:16px;left:16px;font-size:10px;font-weight:700;padding:4px 12px;border-radius:20px;text-transform:uppercase;letter-spacing:.8px}
.nb-standard{background:#F1EFE8;color:#555}
.nb-silver{background:#E6F1FB;color:var(--blue)}
.nb-gold{background:#FAEEDA;color:#854F0B}
.nb-platinium{background:#E1F5EE;color:var(--teal)}
.score-dossier{background:var(--warm);border:1px solid var(--line);border-radius:8px;padding:14px 16px;margin-bottom:14px}
.score-dossier-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.score-dossier-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}
.score-circle-big{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;border:3px solid;flex-shrink:0}
.score-items{display:flex;flex-direction:column;gap:5px}
.score-item{display:flex;align-items:center;gap:8px;font-size:11px}
.score-item-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-ok{background:#1E7A62}
.dot-no{background:#E8E6E0}
.score-bar-wrap{height:6px;background:var(--line);border-radius:3px;overflow:hidden;margin-top:8px}
.score-bar-inner{height:100%;border-radius:3px;transition:width .6s ease}
.mandat-badge{position:absolute;top:16px;right:16px;font-size:10px;font-weight:700;padding:4px 12px;border-radius:20px;background:#FAEEDA;color:#854F0B}
.excl-banner{background:linear-gradient(135deg,#854F0B,#C09B5A);border-radius:8px;padding:14px 16px;margin-bottom:14px;color:#fff;font-size:12px;line-height:1.7}
.excl-banner strong{font-size:14px;display:block;margin-bottom:4px}
.excl-timer{font-size:22px;font-weight:600;color:#FAEEDA;margin:6px 0}
.excl-blocked{background:#F5F2EC;border:2px solid #E8E6E0;border-radius:8px;padding:14px 16px;margin-bottom:14px;text-align:center;font-size:12px;color:var(--muted);line-height:1.7}
.excl-blocked strong{color:var(--ink);display:block;margin-bottom:4px;font-size:13px}
.mode-badge{display:inline-flex;align-items:center;gap:6px;border-radius:20px;padding:4px 12px;font-size:11px;font-weight:600;margin-bottom:10px}
.mode-acheteurs{background:#E6F1FB;color:#0C447C}
.mode-agents{background:#E1F5EE;color:#085041}
.mode-comparatif{background:#FAEEDA;color:#633806}
.quota-agent{background:#F5F2EC;border:1px solid var(--line);border-radius:8px;padding:10px 14px;font-size:11px;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.btn-excl{width:100%;padding:12px;border-radius:8px;border:none;font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;cursor:pointer;margin-bottom:6px;transition:opacity .15s;background:linear-gradient(135deg,#854F0B,#C09B5A);color:#fff}
.btn-excl:hover{opacity:.88}
.btn-excl:disabled{opacity:.5;cursor:not-allowed}

/* INFOS BIEN */
.bien-titre{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:300;margin-bottom:8px;line-height:1.2}
.bien-localisation{font-size:14px;color:var(--muted);margin-bottom:16px;display:flex;align-items:center;gap:6px}
.bien-prix{font-size:36px;font-weight:300;color:var(--ink);margin-bottom:4px}
.bien-pm2{font-size:13px;color:var(--muted);margin-bottom:20px}

/* STATS RAPIDES */
.stats-rapides{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px}
.stat-r{background:var(--warm);border:1px solid var(--line);border-radius:8px;padding:12px;text-align:center}
.stat-r-val{font-size:18px;font-weight:500;margin-bottom:2px}
.stat-r-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}

/* DPE */
.dpe-badge{display:inline-flex;align-items:center;gap:8px;padding:6px 14px;border-radius:8px;font-size:13px;font-weight:600;margin-bottom:20px}
.dpe-A{background:#00A550;color:#fff}
.dpe-B{background:#51B848;color:#fff}
.dpe-C{background:#8DC63F;color:#fff}
.dpe-D{background:#F7C125;color:#0F0F0E}
.dpe-E{background:#F3891D;color:#fff}
.dpe-F{background:#ED1C24;color:#fff}
.dpe-G{background:#9B1915;color:#fff}
.dpe-NC{background:#888780;color:#fff}

/* DESCRIPTION */
.section{margin-bottom:28px}
.section-title{font-size:15px;font-weight:500;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--line)}
.description{font-size:14px;color:var(--muted);line-height:1.9}
.details-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.detail-item{background:var(--warm);border:1px solid var(--line);border-radius:8px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center}
.detail-lbl{font-size:12px;color:var(--muted)}
.detail-val{font-size:13px;font-weight:500}

/* SIDEBAR */
.sidebar{position:sticky;top:70px}
.contact-card{background:var(--warm);border:1px solid var(--line);border-radius:var(--r);padding:20px;margin-bottom:14px}
.contact-title{font-size:14px;font-weight:500;margin-bottom:14px}
.btn-contact{width:100%;padding:12px;border-radius:8px;border:none;font-family:'Outfit',sans-serif;font-size:14px;font-weight:500;cursor:pointer;margin-bottom:8px;transition:opacity .15s;display:block;text-align:center;text-decoration:none}
.btn-contact:hover{opacity:.85}
.bc-teal{background:var(--teal);color:#fff}
.bc-blue{background:var(--blue);color:#fff}
.bc-out{background:transparent;border:1px solid var(--line);color:var(--muted)}
.lock-info{background:var(--bg);border-radius:8px;padding:10px 12px;font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:8px;text-align:center}
.lock-info strong{color:var(--ink)}

/* RAPPORT */
.rapport-card{background:var(--warm);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-bottom:14px}
.rapport-title{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:8px}
.rapport-val{font-size:22px;font-weight:500;color:var(--teal);margin-bottom:2px}
.rapport-sub{font-size:11px;color:var(--muted)}
.rapport-badge{font-size:10px;font-weight:600;padding:3px 10px;border-radius:20px;display:inline-block;margin-top:6px}
.rb-ok{background:#E1F5EE;color:var(--teal)}
.rb-warn{background:#FAEEDA;color:#854F0B}
.rb-bad{background:#FAECE7;color:#993C1D}

/* MODAL CONTACT */
.modal-overlay{position:fixed;inset:0;background:rgba(15,15,14,.6);backdrop-filter:blur(4px);z-index:999;display:none;align-items:center;justify-content:center;padding:24px}
.modal-overlay.open{display:flex}
.modal-box{background:var(--warm);border-radius:var(--r);padding:28px;max-width:480px;width:100%;max-height:90vh;overflow-y:auto}
.modal-title{font-size:18px;font-weight:500;margin-bottom:6px}
.modal-sub{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.5}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
label.lbl{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}
input,textarea{background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:10px 14px;font-family:'Outfit',sans-serif;font-size:13px;color:var(--ink);outline:none;width:100%}
input:focus,textarea:focus{border-color:var(--ink)}
.err-box{background:#FAECE7;border:1px solid #F5C4B3;border-radius:8px;padding:10px;font-size:12px;color:#712B13;margin-bottom:12px;display:none}
.ok-box{background:#E1F5EE;border:1px solid #9FE1CB;border-radius:8px;padding:10px;font-size:12px;color:#1E7A62;margin-bottom:12px;display:none}

/* SIMILAIRES */
.similaires-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.sim-card{background:var(--warm);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;text-decoration:none;color:var(--ink);transition:border-color .2s}
.sim-card:hover{border-color:var(--muted)}
.sim-img{width:100%;height:120px;object-fit:cover;background:var(--line)}
.sim-body{padding:12px}
.sim-titre{font-size:13px;font-weight:500;margin-bottom:4px}
.sim-meta{font-size:11px;color:var(--muted)}
.sim-prix{font-size:14px;font-weight:500;margin-top:6px;color:var(--teal)}

.spin{width:28px;height:28px;border:3px solid var(--line);border-top-color:var(--teal);border-radius:50%;animation:spin 1s linear infinite;margin:60px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.not-found{text-align:center;padding:60px;color:var(--muted);font-size:14px}
.not-found-icon{font-size:48px;margin-bottom:16px}

@media(max-width:760px){
  .bien-layout{grid-template-columns:1fr}
  .sidebar{position:static}
  .stats-rapides{grid-template-columns:1fr 1fr}
  .similaires-grid{grid-template-columns:1fr 1fr}
  .details-grid{grid-template-columns:1fr}
  .bien-titre{font-size:24px}
}
</style>
<style>
/* Bandeau supérieur unifié — fond blanc, texte foncé (override global) */
nav{background:#fff!important;border-bottom:1px solid #E8E6E0!important}
nav .nav-logo{color:#0F0F0E!important}

nav a{color:#0F0F0E!important}

</head>
<body>
<nav>
  <a href="index.html" class="nav-logo"><img src="logo-immoconnect.png" alt="ImmoConnect" style="height:38px;width:auto;object-fit:contain;vertical-align:middle"><span style="font-size:22px;font-weight:600;color:#0F0F0E;margin-left:8px">Immo<span style="color:#C09B5A">Connect</span></span></a>
  <div class="nav-links">

<div class="page">
  <div id="loading"><div class="spin"></div></div>
  <div id="content" style="display:none"></div>
</div>

<!-- MODAL CONTACT -->
<div class="modal-overlay" id="modal-contact">
  <div class="modal-box">
    <div class="modal-title" id="modal-title">Contacter le vendeur</div>
    <div class="modal-sub" id="modal-sub">Envoyez un message pour en savoir plus sur ce bien.</div>
    <div id="modal-err" class="err-box"></div>
    <div id="modal-ok" class="ok-box"></div>
    <div id="modal-form">
      <div class="field"><label class="lbl">Votre nom *</label><input type="text" id="c-nom" placeholder="Jean Dupont"></div>
      <div class="field"><label class="lbl">Votre email *</label><input type="email" id="c-email" placeholder="jean@exemple.fr"></div>
      <div class="field"><label class="lbl">Votre téléphone</label><input type="tel" id="c-tel" placeholder="06 12 34 56 78"></div>
      <div class="field"><label class="lbl">Message *</label><textarea id="c-message" rows="4" placeholder="Bonjour, je suis intéressé(e) par votre bien..."></textarea></div>
      <div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:14px">
        <input type="checkbox" id="c-consent" style="width:16px;height:16px;margin-top:2px;flex-shrink:0;accent-color:var(--teal)">
        <label for="c-consent" style="font-size:12px;color:var(--muted);line-height:1.5;cursor:pointer">J'autorise ImmoConnect à transmettre mes coordonnées au vendeur dans le cadre de ce projet immobilier.</label>
      </div>
      <button class="btn-contact bc-teal" onclick="envoyerContact()">Envoyer mon message →</button>
      <button class="btn-contact bc-out" style="margin-top:6px" onclick="fermerModal()">Annuler</button>
    </div>
  </div>
</div>

<!-- MODAL VISITE -->
<div class="modal-overlay" id="modal-visite">
  <div class="modal-box">
    <div class="modal-title">📅 Réserver une visite</div>
    <div class="modal-sub" id="visite-sub">Choisissez un créneau disponible</div>
    <div id="visite-content"><div class="spin"></div></div>
    <button class="btn-contact bc-out" style="margin-top:14px" onclick="document.getElementById('modal-visite').classList.remove('open')">Fermer</button>
  </div>
</div>

<script>
const SB_URL = 'https://zxxhyefajfwqcxcfxpmg.supabase.co';
const SB_KEY = 'sb_publishable_cW5-jNMT_wq5ng4XdOYgQQ_BM6DecbM';
const { createClient } = supabase;
const db = createClient(SB_URL, SB_KEY);

var bien = null;
var currentUser = null;

// ── INIT ──
(async function() {
  var params = new URLSearchParams(window.location.search);
  var id = params.get('id');
  if (!id) { afficherErreur('Annonce introuvable'); return; }

  // Mettre à jour le title de la page
  document.title = 'ImmoConnect — Chargement…';

  // Charger le bien
  var { data, error } = await db.from('annonces_vendeurs')
    .select('*').eq('id', id).eq('statut_annonce', 'publiee').single();

  if (error || !data) { afficherErreur('Cette annonce n\'existe pas ou a été supprimée.'); return; }
  bien = data;

  // Mettre à jour meta
  document.title = 'ImmoConnect — ' + (bien.titre || bien.type_bien + ' · ' + bien.ville);
  var metaDesc = document.querySelector('meta[name="description"]');
  if (metaDesc) metaDesc.content = (bien.type_bien||'Bien') + ' ' + (bien.surface||'') + 'm² à ' + (bien.ville||'') + ' — ' + (bien.prix ? Math.round(bien.prix).toLocaleString('fr-FR') + '€' : '');

  // Vérifier si connecté (refresh pour récupérer un abonnement récent)
  try { await db.auth.refreshSession(); } catch (e) {}
  var { data: { session } } = await db.auth.getSession();
  currentUser = session ? session.user : null;

  // Incrémenter vues (si pas le propriétaire)
  if (!currentUser || currentUser.email !== bien.email_contact) {
    await db.rpc('incrementer_vues', { annonce_uuid: bien.id }).then(undefined, function(){});
  }

  // Charger biens similaires
  var { data: similaires } = await db.from('annonces_vendeurs')
    .select('id,titre,type_bien,surface,prix,ville,niveau_vendeur')
    .eq('statut_annonce', 'publiee')
    .eq('type_bien', bien.type_bien)
    .neq('id', bien.id)
    .limit(3);

  try {
    await afficherBien(bien, similaires || []);
  } catch (err) {
    console.error('Erreur affichage bien:', err);
    var l = document.getElementById('loading'); if (l) l.style.display = 'none';
    var ct = document.getElementById('content');
    if (ct) { ct.style.display = 'block';
      ct.innerHTML = '<div style="max-width:620px;margin:60px auto;padding:24px;text-align:center;color:#712B13;background:#FAECE7;border-radius:10px;font-size:14px">Une erreur est survenue à l\'affichage de cette annonce.<br><span style="font-size:11px;color:#9a6a55">' + ((err && err.message) ? err.message : err) + '</span></div>'; }
  }
})();

// ── ACHAT RAPPORT (Stripe) ──
var REPORT_PRICE_ID = 'price_1TdFJmRWjX9H4QylhXCGndPu'; // dossier complet 4,99€ (prix Stripe existant)
async function acheterRapport(annonceId) {
  try {
    var res = await fetch('https://zxxhyefajfwqcxcfxpmg.supabase.co/functions/v1/creer-checkout', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        price_id: REPORT_PRICE_ID,
        forfait: 'rapport',
        mode: 'payment',

// ── SCORE DOSSIER VENDEUR ──
function calculerScoreDossier(b) {
  var criteres = [
    { label: 'Photos (3 minimum)',         ok: b.photos && b.photos.length >= 3,           pts: 10 },
    { label: 'Description rédigée',        ok: b.description && b.description.length > 50, pts: 10 },
    { label: 'Surface renseignée',         ok: !!b.surface,                                pts: 5  },
    { label: 'Nombre de pièces',           ok: !!b.nb_pieces,                              pts: 5  },
    { label: 'Prix demandé',               ok: !!b.prix,                                   pts: 5  },
    { label: 'Année de construction',      ok: !!b.annee_construction,                     pts: 5  },
    { label: 'Valeur locative / Loyer',    ok: !!b.valeur_locative || !!b.loyer_mensuel,   pts: 10 },
    { label: 'Taxe foncière vérifiée',     ok: !!b.taxe_fonciere_montant,                  pts: 15 },
    { label: 'Règlement de copropriété',   ok: !!b.copro_doc || b.is_copro === 'Non',      pts: 10 },
    { label: 'DPE renseigné',              ok: !!b.classe_dpe,                             pts: 15 },
    { label: 'Adresse complète',           ok: !!b.adresse,                                pts: 5  },
    { label: 'Géolocalisation',            ok: !!b.latitude && !!b.longitude,              pts: 5  }
  ]
  var total = criteres.reduce(function(acc, c) { return acc + c.pts; }, 0)
  var obtenu = criteres.filter(function(c) { return c.ok; }).reduce(function(acc, c) { return acc + c.pts; }, 0)
  var score = Math.round(obtenu / total * 100)
  return { score, criteres, obtenu, total }
}

function startCountdown(bienId, msRestants) {
  var interval = setInterval(function() {
    msRestants -= 1000;
    if (msRestants <= 0) {
      clearInterval(interval);
      var wrap = document.getElementById('countdown-wrap-' + bienId);
      if (wrap) {
        wrap.style.background = '#F1EFE8';
        wrap.style.border = '1px solid var(--line)';
        wrap.innerHTML = '<div style="font-size:12px;color:var(--muted);text-align:center">⏰ Fenêtre de candidature fermée — scoring en cours...</div>';
      }
      return;
    }
    var h = Math.floor(msRestants / 3600000);
    var m = Math.floor((msRestants % 3600000) / 60000);
    var s = Math.floor((msRestants % 60000) / 1000);
    var el = document.getElementById('countdown-' + bienId);
    if (el) el.textContent = h + 'h ' + m + 'min ' + s + 's';
    // Passer en rouge si moins de 6h
    if (msRestants < 6 * 3600000) {
      var wrap = document.getElementById('countdown-wrap-' + bienId);
      if (wrap) { wrap.style.background = '#FAECE7'; wrap.style.borderColor = '#F5C4B3'; }
      if (el) el.style.color = '#C0392B';
    }
  }, 1000);
}

function copyLienBien(id) {
  var lien = 'https://immoconnect-agence.fr/bien.html?id=' + id;
  navigator.clipboard.writeText(lien).then(function() {
    var btn = event.currentTarget;
    var old = btn.innerHTML;
    btn.innerHTML = '✅ Lien copié !';
    btn.style.borderColor = 'var(--teal)';
    setTimeout(function(){ btn.innerHTML = old; btn.style.borderColor = 'var(--line)'; }, 2000);
  });
}

    if (forfaitComp === 'pay_per_use') {
      html += '<div style="background:#E1F5EE;border:1px solid #9FE1CB;border-radius:8px;padding:10px 14px;margin-bottom:8px;font-size:11px;color:#085041;line-height:1.6">'
        + '🏆 <strong>Sélection top 3 ouverte</strong> — Vous avez accès à ce dossier complet car le vendeur demande une sélection Hanaé IA. Candidatez pour être parmi les 3 meilleurs profils présentés.'
        + '</div>'
    }

    // Accès dossier pour tous en mode comparatif
    html += '<a href="rapport-hanae.html?annonce=' + b.id + '&mode=agent" class="btn-contact bc-blue" style="display:block;text-align:center;text-decoration:none;padding:10px;border-radius:8px;font-weight:500;margin-bottom:6px">📊 Consulter le dossier complet</a>'
    html += '<a href="candidature-agent.html?annonce=' + b.id + '" class="btn-contact" style="display:block;text-align:center;text-decoration:none;padding:12px;border-radius:8px;background:#1E7A62;color:#fff;font-weight:500">🏆 Candidater — Sélection top 3 — 9,99 €</a>'
  }
  }

  // BOUTON SIGNALER pour vendeurs — si l\'agent a contacté hors mode autorisé
  if (!isAgent && currentUser && modeContact === 'acheteurs') {
    html += '<div style="margin-top:8px;text-align:center">'
    html += '<button onclick="ouvrirSignalement(\'' + b.id + '\', \'\')" style="font-size:11px;color:var(--muted);background:transparent;border:none;cursor:pointer;text-decoration:underline;font-family:Outfit,sans-serif">⚠️ Signaler un contact agent non sollicité</button>'
    html += '</div>'
  }

  // BOUTON SUIVI BAISSES DE PRIX pour acheteurs connectés
  if (currentUser && !isAgent) {
    html += '<div style="margin-top:8px" id="suivi-wrap-' + b.id + '">';
    html += '<button id="btn-suivi-' + b.id + '" onclick="toggleSuivi(\'' + b.id + '\')" style="width:100%;padding:9px;border-radius:8px;border:1px solid var(--line);background:transparent;font-family:Outfit,sans-serif;font-size:12px;cursor:pointer;color:var(--muted);transition:all .15s" onmouseover="this.style.borderColor=\'var(--ink)\'" onmouseout="this.style.borderColor=\'var(--line)\'">🔔 Alertes baisse de prix</button>';
    html += '</div>';
  }

  // BOUTON EXCLUSIVITÉ pour agents Expert et Platinium
  if (isAgent && (userForfait === 'expert' || userForfait === 'platinium') && !exclusiviteActive) {
    var duree = userForfait === 'platinium' ? 96 : 48;
    var prix = '9,99'; // contact vendeur = 9,99€ (dossier complet inclus)
    html += '<div style="margin-top:10px;border-top:1px solid var(--line);padding-top:10px">';
    html += '<button class="btn-excl" onclick="acheterExclusivite(' + duree + ',' + prix.replace(',','.') + ')">';
    html += '🔒 Exclusivité ' + duree + 'h — ' + prix + ' €</button>';
    html += '<div style="font-size:10px;color:var(--muted);text-align:center">Seul agent à contacter ce vendeur pendant ' + duree + 'h</div>';
    html += '</div>';
  }

  return html;
}

// ── DÉCLARER ACHETEUR POTENTIEL (mode acheteurs_agents) ──
async function declarerAcheteur(annonceId, mandatId, forfait) {
  if (!currentUser) { window.location.href = 'connexion.html'; return; }

  // Vérifier le quota via matcher-mandats
  var res = await db.functions.invoke('matcher-mandats', {
    body: {
      type: 'verifier_quota_lead',
      data: { agent_email: currentUser.email, annonce_id: annonceId, forfait: forfait }
    }
  }).then(undefined, function(){ return { data: { autorise: false, message: 'Erreur réseau' } }; })

  var result = res.data || {}
  if (!result.autorise) {
    if (result.raison === 'quota_epuise') {
      showToast('Quota de contacts vendeur atteint cette semaine.', 'error')
    } else {
      showToast(result.message || 'Contact non autorisé.', 'error')
    }
    return
  }

  // Ouvrir la messagerie avec pré-remplissage "J\'ai un acheteur potentiel"
  var { data: annonce } = await db.from('annonces_vendeurs').select('email_contact, titre, type_bien, ville').eq('id', annonceId).single().then(undefined, function(){ return { data: null } })
  var { data: mandat } = await db.from('mandats_recherche').select('label, budget_max, type_bien, secteur').eq('id', mandatId).single().then(undefined, function(){ return { data: null } })

  var message = 'Bonjour,\n\nJ\'ai un acheteur potentiel pour votre bien.'
    + (mandat ? '\n\nProfil acheteur : ' + (mandat.label || 'Acheteur qualifié') + ' — budget jusqu\'à ' + Math.round(parseFloat(mandat.budget_max || 0)).toLocaleString('fr-FR') + ' €.' : '')
    + '\n\nJe souhaite vous contacter pour vous présenter ce profil et discuter d\'un mandat simple.';

  // Insérer le message en base
  await db.from('messages').insert({
    expediteur_email: currentUser.email,
    destinataire_email: annonce?.email_contact,
    annonce_id: annonceId,
    message: message,
    type: 'acheteur_potentiel',
    mandat_recherche_id: mandatId,
    lu: false
  }).then(undefined, function(){})

  // Envoyer email au vendeur
  await db.functions.invoke('envoyer-email', {
    body: {
      type: 'acheteur_potentiel_vendeur',
      to: annonce?.email_contact,
      subject: 'Un agent a un acheteur potentiel pour votre bien · ImmoConnect',
      bien_titre: annonce?.titre || (annonce?.type_bien + ' ' + annonce?.ville),
      agent_email: currentUser.email,
      agent_nom: currentUser.user_metadata?.prenom + ' ' + currentUser.user_metadata?.nom,
      mandat_label: mandat?.label || 'Acheteur qualifié',
      budget_max: mandat?.budget_max,
      lien: 'https://immoconnect-agence.fr/messagerie.html?annonce=' + annonceId
    }
  }).then(undefined, function(){})

  showToast('Votre message a été envoyé au vendeur.', 'ok')
  // Rediriger vers la messagerie
  setTimeout(function(){ window.location.href = 'messagerie.html?annonce=' + annonceId }, 1500)
}

async function envoyerContact() {
  if (!currentUser) { window.location.href = 'connexion.html'; return; }
  var nom = document.getElementById('c-nom').value.trim();
  var email = document.getElementById('c-email').value.trim();
  var tel = document.getElementById('c-tel').value.trim();
  var msg = document.getElementById('c-message').value.trim();
  var consent = document.getElementById('c-consent').checked;
  var err = document.getElementById('modal-err');
  var ok = document.getElementById('modal-ok');

  err.style.display = 'none'; ok.style.display = 'none';

  if (!nom || !email || !msg) { err.textContent = 'Remplissez tous les champs obligatoires.'; err.style.display = 'block'; return; }
  if (!consent) { err.textContent = 'Cochez la case de consentement.'; err.style.display = 'block'; return; }
  if (!bien) return;

  // Plafond : 5 vendeurs / 7 jours (abonnés illimité)
  if (!window._estAbonne) {
    try {
      var _depuis = new Date(Date.now() - 7*24*3600*1000).toISOString();
      var _cpt = await db.from('contacts_envoyes').select('id').eq('user_id', currentUser.id).gte('created_at', _depuis);
      if (_cpt && _cpt.data && _cpt.data.length >= 5) { err.textContent = 'Limite de 5 contacts par semaine atteinte. Passez à un abonnement pour contacter sans limite.'; err.style.display='block'; return; }
    } catch(e) {}
  }

  // Surveillance Hanaé : blocage du démarchage d'agent déguisé
  try {
    var _scan = await db.functions.invoke('analyser-contact', { body: { message: msg, nom: nom } });
    if (_scan && _scan.data && _scan.data.suspect === true) { err.textContent = "Ce message s'apparente à du démarchage professionnel. Le contact vendeur est réservé aux acheteurs ; les agents disposent d'un accès dédié via leur abonnement."; err.style.display='block'; return; }
  } catch(e) {}

  try {
    // Enregistrer dans messages_annonces
    await db.from('messages_annonces').insert({
      annonce_id: bien.id,
      email_vendeur: bien.email_contact,
      nom_acheteur: nom,
      email_acheteur: email,
      telephone_acheteur: tel || null,
      message: msg,
      lu: false
    });
    // Compteur du plafond hebdomadaire
    await db.from('contacts_envoyes').insert({ user_id: currentUser.id, user_email: currentUser.email, annonce_id: bien.id, email_vendeur: bien.email_contact }).then(undefined, function(){});

    // Incrémenter contacts
    await db.rpc('incrementer_contacts', { annonce_uuid: bien.id }).then(undefined, function(){});

    // Notifier le vendeur
    await db.functions.invoke('envoyer-email', {
      body: {
        type: 'nouveau_message',
        to: bien.email_contact,
        subject: '💬 Nouveau contact pour votre bien — ImmoConnect',
        expediteur: nom,
        message: msg,
        bien: (bien.type_bien||'Bien') + ' · ' + (bien.ville||''),
        lien: 'https://immoconnect-agence.fr/connexion.html'
      }
    }).then(undefined, function(){});

    ok.textContent = '✅ Message envoyé ! Le vendeur vous répondra rapidement.';
    ok.style.display = 'block';
    document.getElementById('modal-form').style.display = 'none';

  } catch(e) {
    err.textContent = 'Erreur : ' + e.message;
    err.style.display = 'block';
  }
}

function setPhoto(idx){

}
function navPhoto(dir){ setPhoto((window._photoIdx||0)+dir); }
function setSimuMode(m){
  var card=document.querySelector('.simu-card'); if(!card) return;
  if(m==='impot') card.classList.remove('mode-simple'); else card.classList.add('mode-simple');
  var ts=document.getElementById('tab-simple'), ti=document.getElementById('tab-impot');
  if(ts) ts.classList.toggle('active', m!=='impot');
  if(ti) ti.classList.toggle('active', m==='impot');
}
function recalcSimu(){
  var prix=+(document.getElementById('si-prix').value)||0;
  var apport=+(document.getElementById('si-apport').value)||0;
  var taux=+(document.getElementById('si-taux').value)||0;
  var duree=+(document.getElementById('si-duree').value)||0;
  var type=document.getElementById('si-type').value;
  var tauxNot=type==='neuf'?0.025:0.075;
  var notaire=Math.round(prix*tauxNot);
  var total=prix+notaire;
  var emprunt=Math.max(total-apport,0);
  var mens=0;
  if(emprunt>0 && duree>0){
    if(taux>0){ var i=taux/100/12, n=duree*12; mens=Math.round(emprunt*i/(1-Math.pow(1+i,-n))); }
    else { mens=Math.round(emprunt/(duree*12)); }
  }
  var f=function(v){return (Math.round(v)).toLocaleString('fr-FR')+' \u20ac';};
  document.getElementById('so-notaire').textContent=f(notaire);
  document.getElementById('so-total').textContent=f(total);
  document.getElementById('so-emprunt').textContent=f(emprunt);
  document.getElementById('so-mens').textContent=mens?f(mens)+'/mois':'\u2014';
  var s=window._simu||{};
  if(s.silverPlus){
    var la=(s.loyer||0)*12;
    var eb=document.getElementById('so-rdt-brut'), en=document.getElementById('so-rdt-net');
    if(eb) eb.textContent=(prix>0&&la>0)?(la/prix*100).toFixed(1)+' %':'\u2014';
    if(en) en.textContent=(prix>0&&la>0)?((la-(s.charges||0))/prix*100).toFixed(1)+' %':'\u2014';
    var regime=(document.getElementById('si-regime')||{}).value||'micro';
    var tmi=(document.getElementById('si-tmi')||{}).value;
    var revenuFoyer=+(document.getElementById('si-revenu')||{}).value||0;
    var parts=+(document.getElementById('si-parts')||{}).value||1;
    var interets=Math.round(emprunt*(taux/100));
    var fiscCalc=(revenuFoyer>0)||(tmi!==''&&tmi!=null);
    var loyerM=s.loyer||0, chargesM=(s.charges||0)/12;
    var cfAvant=loyerM-chargesM-mens;
    var fcf=function(v){var x=Math.round(v);return (x>=0?'+':'')+x.toLocaleString('fr-FR')+' \u20ac/mois';};
    var RED='#c0392b';
    var ei=document.getElementById('so-impot'), ea=document.getElementById('so-rdt-apres'), em=document.getElementById('so-mode'), ca=document.getElementById('so-cf-avant'), cp=document.getElementById('so-cf-apres');
    if(ca){ ca.textContent=la>0?fcf(cfAvant):'\u2014'; ca.style.color=(la>0&&cfAvant<0)?RED:''; }
    if(!fiscCalc){
      if(ei) ei.textContent='Non calculable';
      if(ea) ea.textContent='Non calculable';
      if(cp){ cp.textContent='Non calculable'; cp.style.color=''; }
      if(em) em.textContent='Renseignez votre revenu imposable et vos parts (ou au minimum votre TMI) pour estimer l\'imp\u00f4t et le cash-flow apr\u00e8s imp\u00f4t.';
    } else {
      var r=calculerImpot({loyerAnnuel:la, charges:(s.charges||0), interets:interets, prix:prix, regime:regime, typeBien:(s.typeBien||''), revenuFoyer:revenuFoyer, parts:parts, tmi:tmi});
      var impot=r.impot;
      var cfApres=cfAvant-impot/12;
      if(ei) ei.textContent=la>0?f(impot)+'/an':'\u2014';
      if(ea) ea.textContent=(prix>0&&la>0)?(((la-(s.charges||0)-impot)/prix)*100).toFixed(1)+' %':'\u2014';
      if(cp){ cp.textContent=la>0?fcf(cfApres):'\u2014'; cp.style.color=(la>0&&cfApres<0)?RED:''; }
      if(em){ em.textContent=(r.mode==='bareme')?('Imp\u00f4t au bar\u00e8me progressif ('+parts+' part'+(parts>1?'s':'')+', revenu foyer renseign\u00e9) + 17,2 % de pr\u00e9l\u00e8vements sociaux.'):('Estimation simplifi\u00e9e \u00e0 la TMI ('+tmi+' %) + 17,2 % \u2014 renseignez revenu imposable et parts pour un calcul au bar\u00e8me.'); }
    }
  }
}
function _irBareme(revenu, parts){
  parts = parts>0?parts:1;
  var q=revenu/parts; if(q<=0) return 0;
  var tr=[[11600,0],[29579,0.11],[84577,0.30],[181917,0.41],[1e15,0.45]];
  var t=0, prev=0;
  for(var i=0;i<tr.length;i++){ var seuil=tr[i][0], taux=tr[i][1]; if(q>prev){ t+=(Math.min(q,seuil)-prev)*taux; prev=seuil; } else break; }
  return t*parts;
}
function calculerImpot(p){
  var loyer=p.loyerAnnuel||0, charges=p.charges||0, interets=p.interets||0, prix=p.prix||0, regime=p.regime||'micro';
  var base=0, basePS=0;
  if(regime==='micro'){ if(loyer>15000) regime='reel'; else { base=loyer*0.70; basePS=base; } }
  if(regime==='lmnp_micro'){ if(loyer>77700) regime='lmnp_reel'; else { base=loyer*0.50; basePS=base; } }
  if(regime==='reel'){ base=loyer-charges-interets; basePS=Math.max(0,base); }
  if(regime==='lmnp_reel'){
    var pt=(p.typeBien&&p.typeBien.toLowerCase().indexOf('maison')!==-1)?0.20:0.15;
    var amortMax=prix*(1-pt)/30 + prix*0.10/7;
    var resAvant=loyer-charges-interets;
    var amort=Math.min(Math.max(resAvant,0), amortMax);
    base=Math.max(0, resAvant-amort); basePS=base;
  }
  var ps=Math.round(Math.max(0,basePS)*0.172);
  var ir=0, mode='tmi';
  var bi=base<0?Math.max(base,-10700):base;
  if(p.revenuFoyer>0){
    ir=Math.round(_irBareme(p.revenuFoyer+bi, p.parts)-_irBareme(p.revenuFoyer, p.parts));
    mode='bareme';
  } else {
    ir=Math.round(bi*(parseFloat(p.tmi)/100));
  }
  return { impot: ir+ps, ir: ir, ps: ps, base: Math.round(base), regime: regime, mode: mode };
}

  if (!raison) return;
  var { data: { user } } = await db.auth.getUser();

  var annonceId = params.get('id');
  await db.from('signalements_agents').insert({
    annonce_id: annonceId,
    signale_par: user.email,
    raison: raison,
    statut: 'en_attente',
    created_at: new Date().toISOString()
  }).then(undefined, function(){});
  await db.functions.invoke('envoyer-email', {
    body: {
      type: 'signalement_agent',
      to: 'contact@immoconnect-agence.fr',
      subject: 'Signalement contact agent abusif — ' + annonceId,
      email_signale: 'inconnu',
      email_signalant: user.email,
      conversation_id: annonceId,
      raison: raison,
      lien: 'https://immoconnect-agence.fr/admin-agents.html'

  }).then(undefined, function(){});

}

function copierLien(url) {
  navigator.clipboard.writeText(url).then(function() {
    var btn = document.getElementById('btn-copier-lien');
    if (btn) {
      btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> Copié !';
      btn.style.background = 'var(--teal)';
      btn.style.color = '#fff';
      btn.style.borderColor = 'var(--teal)';
      setTimeout(function() {
        btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copier le lien';
        btn.style.background = 'var(--warm)';
        btn.style.color = 'var(--ink)';
        btn.style.borderColor = 'var(--line)';
      }, 2000);
    }
  }).then(undefined, function() {
    var ta = document.createElement('textarea');
    ta.value = url;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  });
}

function majMetaOG(b, url, titrePartage) {
  document.title = 'ImmoConnect — ' + titrePartage;
  var setMeta = function(id, val) { var el = document.getElementById(id); if (el) el.setAttribute('content', val); };
  var desc = (b.type_bien||'Bien') + ' de ' + (b.surface||'—') + 'm² à ' + (b.ville||'') + (b.prix ? ' — ' + Math.round(b.prix).toLocaleString('fr-FR') + '€' : '') + '. Découvrez ce bien sur ImmoConnect.';
  setMeta('og-title', titrePartage + ' · ImmoConnect');
  setMeta('og-desc', desc);
  setMeta('og-url', url);
  var photo = '';
  if (b.photo_principale) { photo = b.photo_principale; }
  else if (b.photos_supplementaires) { try { var p = JSON.parse(b.photos_supplementaires); if (p&&p[0]) photo=p[0]; } catch(e){} }
  if (photo) setMeta('og-image', photo);
}
