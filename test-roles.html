<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test des rôles — ImmoConnect (admin)</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing:border-box; font-family:system-ui,-apple-system,sans-serif; }
  body { margin:0; background:#F3F1EC; color:#1a1a1a; }
  header { background:#0F0F0E; color:#FAFAF7; padding:18px 24px; }
  header b { color:#C9A04E; }
  .wrap { max-width:680px; margin:26px auto; padding:0 18px; }
  .lead { color:#6b6b6b; font-size:14px; margin-bottom:20px; line-height:1.6; }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .role { background:#fff; border:1px solid #e6e2d8; border-radius:12px; padding:16px; cursor:pointer; text-align:left; }
  .role:hover { border-color:#C9A04E; }
  .role h3 { margin:0 0 4px; font-size:15px; }
  .role p { margin:0; font-size:12px; color:#6b6b6b; }
  .role .emo { font-size:22px; }
  #etat { margin:22px 0; padding:14px 16px; border-radius:10px; background:#fff; border:1px solid #e6e2d8; font-size:14px; }
  .ok { color:#1a7f45; } .ko { color:#b3261e; }
  .liens { margin-top:18px; display:flex; flex-wrap:wrap; gap:8px; }
  .liens a { font-size:13px; text-decoration:none; color:#0F0F0E; border:1px solid #0F0F0E; border-radius:8px; padding:7px 12px; }
</style>
</head>
<body>
<header>🔧 <b>ImmoConnect</b> · Test des rôles <span style="font-size:12px;opacity:.6">(admin)</span></header>

<div class="wrap">
  <div id="status">Chargement…</div>

  <div id="app" style="display:none">
    <p class="lead">Bascule ton compte entre les rôles pour tester l'expérience. Ton accès <b>admin</b> (basé sur ton email) reste actif. Après un changement, <b>recharge</b> la page à tester.</p>
    <div class="grid" id="grid"></div>
    <div id="etat">Choisis un rôle ci-dessus.</div>
    <div class="liens">
      <a href="bien.html" target="_blank">Ouvrir une annonce →</a>
      <a href="recherche.html" target="_blank">Recherche →</a>
      <a href="connexion.html" target="_blank">Mon espace →</a>
      <a href="index.html" target="_blank">Accueil →</a>
    </div>
  </div>
</div>

<script>
function setStatus(msg, cls){ var s=document.getElementById('status'); if(s){ s.textContent=msg; s.className=cls||''; } }
function etat(msg, cls){ var e=document.getElementById('etat'); if(e){ e.textContent=msg; e.className=cls||''; } }

try {
  if (typeof supabase === 'undefined' || !supabase.createClient) {
    setStatus('⚠️ La librairie Supabase ne s\'est pas chargée (CDN bloqué ?). Recharge la page.', 'ko');
  } else {
    var SB_URL = 'https://zxxhyefajfwqcxcfxpmg.supabase.co';
    var SB_KEY = 'sb_publishable_cW5-jNMT_wq5ng4XdOYgQQ_BM6DecbM';
    var ADMINS = ['davidjaquet@live.fr', 'davidjaquet.lgtm@gmail.com'];
    var db = supabase.createClient(SB_URL, SB_KEY);

    var ROLES = [
      { emo:'🛒', titre:'Acheteur (sans forfait)', desc:'Profil acheteur standard',  profils:[],               forfait:null,          av:'supprimer' },
      { emo:'🏠', titre:'Vendeur',                 desc:'Espace vendeur',             profils:['vendeur'],      forfait:null,          av:'supprimer' },
      { emo:'💼', titre:'Investisseur',            desc:'Abonné investisseur',        profils:['investisseur'], forfait:null,          av:'supprimer' },
      { emo:'🪪', titre:'Agent sans forfait',      desc:'Agent en pay-per-use',       profils:['agent'],        forfait:'pay_per_use', av:'sans' },
      { emo:'⭐', titre:'Agent avec forfait',      desc:'Agent abonné (premium)',     profils:['agent'],        forfait:'premium',     av:'avec' },
      { emo:'🔄', titre:'Réinitialiser (agent admin)', desc:'Agent + premium',        profils:['agent'],        forfait:'premium',     av:'avec' }
    ];

    function appliquer(role){
      etat('Application du rôle « ' + role.titre + ' »…');
      db.auth.updateUser({ data: { profils: role.profils, forfait_agent: role.forfait } }).then(function(up){
        if (up.error) { etat('Erreur métadonnées : ' + up.error.message, 'ko'); return; }
        db.functions.invoke('test-forfait', { body: { mode: role.av } }).then(function(fonc){
          if (fonc.error || (fonc.data && !fonc.data.ok)) {
            etat('Rôle (métadonnées) OK, mais le forfait n\'a pas pu être réglé : ' + ((fonc.data && fonc.data.error) || (fonc.error && fonc.error.message) || '?') + ' — la fonction « test-forfait » est-elle déployée (Verify JWT OFF) ?', 'ko');
            return;
          }
          etat('✅ Rôle « ' + role.titre + ' » appliqué. Recharge la page à tester.', 'ok');
        });
      });
    }

    db.auth.getUser().then(function(res){
      var user = res && res.data ? res.data.user : null;
      if (!user) { setStatus('Tu n\'es pas connecté. '); var a=document.createElement('a'); a.href='connexion.html'; a.textContent='Se connecter →'; document.getElementById('status').appendChild(a); return; }
      if (ADMINS.indexOf(user.email) === -1) { setStatus('Connecté en ' + user.email + ' — cette page est réservée à l\'administrateur.', 'ko'); return; }

      document.getElementById('status').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      var grid = document.getElementById('grid');
      ROLES.forEach(function(role){
        var b = document.createElement('button');
        b.className = 'role';
        b.innerHTML = '<div class="emo">'+role.emo+'</div><h3>'+role.titre+'</h3><p>'+role.desc+'</p>';
        b.onclick = function(){ appliquer(role); };
        grid.appendChild(b);
      });
      var cur = (user.user_metadata && user.user_metadata.profils) || [];
      etat('Profil actuel : ' + (cur.length ? cur.join(', ') : 'acheteur') + (user.user_metadata && user.user_metadata.forfait_agent ? ' · forfait ' + user.user_metadata.forfait_agent : ''));
    }).catch(function(e){ setStatus('Erreur de connexion : ' + e.message, 'ko'); });
  }
} catch(e) {
  setStatus('Erreur JavaScript : ' + e.message, 'ko');
}
</script>
</body>
</html>
