<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ImmoConnect — Admin Validation Agents</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--ink:#0F0F0E;--muted:#888780;--bg:#F5F2EC;--warm:#FEFDFB;--line:#E8E6E0;--gold:#C09B5A;--teal:#1E7A62;--amber:#D4732A;--r:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--ink);font-size:14px}
nav{background:var(--ink);height:54px;display:flex;align-items:center;padding:0 24px}
.nav-logo{font-size:18px;font-weight:600;color:#fff;text-decoration:none}
.nav-logo span{color:var(--gold)}
.badge-admin{font-size:10px;background:#C0392B;color:#fff;padding:2px 8px;border-radius:20px;margin-left:10px;font-weight:600}
.page{max-width:960px;margin:0 auto;padding:32px 24px 80px}
.page-title{font-size:22px;font-weight:500;margin-bottom:4px}
.page-sub{font-size:13px;color:var(--muted);margin-bottom:28px}
.agent-card{background:var(--warm);border:1px solid var(--line);border-radius:var(--r);padding:20px;margin-bottom:14px}
.agent-header{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.agent-avatar{width:44px;height:44px;border-radius:50%;background:var(--amber);color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:600;flex-shrink:0}
.agent-info{flex:1}
.agent-name{font-size:14px;font-weight:500}
.agent-email{font-size:12px;color:var(--muted)}
.agent-badge{font-size:10px;font-weight:600;padding:3px 10px;border-radius:20px}
.ab-pending{background:#FAEEDA;color:#854F0B}
.ab-ok{background:#E1F5EE;color:var(--teal)}
.ab-refused{background:#FAECE7;color:#C0392B}
.agent-details{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.detail-item{background:var(--bg);border-radius:8px;padding:10px 12px}
.detail-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.detail-val{font-size:13px;font-weight:500}
.ocr-result{background:var(--bg);border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:12px;color:var(--muted);line-height:1.6}
.actions{display:flex;gap:10px}
.btn-valid{padding:9px 20px;border-radius:8px;border:none;background:var(--teal);color:#fff;font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;cursor:pointer}
.btn-valid:hover{opacity:.85}
.btn-refuse{padding:9px 20px;border-radius:8px;border:1px solid #F5C4B3;background:transparent;color:#C0392B;font-family:'Outfit',sans-serif;font-size:13px;cursor:pointer}
.btn-verify{padding:9px 20px;border-radius:8px;border:1px solid var(--line);background:transparent;color:var(--muted);font-family:'Outfit',sans-serif;font-size:12px;cursor:pointer;text-decoration:none;display:inline-block}
.empty{text-align:center;padding:48px;color:var(--muted);background:var(--warm);border:1px solid var(--line);border-radius:var(--r)}
.spin{width:24px;height:24px;border:3px solid var(--line);border-top-color:var(--teal);border-radius:50%;animation:spin 1s linear infinite;margin:40px auto}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">Immo<span>Connect</span></a>
  <span class="badge-admin">ADMIN</span>
</nav>
<div class="page">
  <div class="page-title">🔐 Validation des comptes agents</div>
  <div class="page-sub">Vérifiez les cartes professionnelles et activez les comptes agents. Délai max : 48h.</div>
  <div id="loading"><div class="spin"></div></div>
  <div id="content" style="display:none"></div>
</div>

<script>
const SB_URL = 'https://zxxhyefajfwqcxcfxpmg.supabase.co';
const SB_KEY = 'sb_publishable_cW5-jNMT_wq5ng4XdOYgQQ_BM6DecbM';
const { createClient } = supabase;
const db = createClient(SB_URL, SB_KEY);

// ── SÉCURITÉ ADMIN ──
const ADMIN_EMAILS = ['davidjaquet.lgtm@gmail.com']; // à compléter si plusieurs admins

var agents = [];

(async function() {
  // Vérification session admin
  var { data: { session } } = await db.auth.getSession();
  if (!session || !ADMIN_EMAILS.includes(session.user.email)) {
    document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;flex-direction:column;gap:16px"><div style="font-size:48px">🔒</div><div style="font-size:18px;font-weight:500">Accès réservé</div><div style="font-size:13px;color:#888">Connectez-vous avec un compte administrateur</div><a href="connexion.html" style="margin-top:8px;padding:10px 24px;background:#0F0F0E;color:#fff;border-radius:8px;text-decoration:none;font-size:14px">Se connecter →</a></div>';
    return;
  }

  // Charger les agents en attente depuis la table agents_validation
  var { data } = await db.from('agents_validation')
    .select('*').order('created_at', { ascending: false });
  agents = data || [];
  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';
  afficher();
})();

function afficher() {
  var pending = agents.filter(function(a){ return a.statut === 'en_attente'; });
  var others = agents.filter(function(a){ return a.statut !== 'en_attente'; });
  var html = '';

  html += '<div style="font-size:13px;font-weight:500;margin-bottom:14px;color:var(--amber)">⏳ En attente de validation (' + pending.length + ')</div>';

  if (!pending.length) {
    html += '<div class="empty">✅ Aucun compte agent en attente de validation.</div>';
  } else {
    pending.forEach(function(a) { html += buildCard(a); });
  }

  if (others.length) {
    html += '<div style="font-size:13px;font-weight:500;margin:24px 0 14px;color:var(--muted)">Historique (' + others.length + ')</div>';
    others.slice(0,5).forEach(function(a) { html += buildCard(a); });
  }
  document.getElementById('content').innerHTML = html;
}

function buildCard(a) {
  var badgeCls = a.statut === 'valide' ? 'ab-ok' : a.statut === 'refuse' ? 'ab-refused' : 'ab-pending';
  var badgeTxt = a.statut === 'valide' ? '✅ Validé' : a.statut === 'refuse' ? '❌ Refusé' : '⏳ En attente';
  var expiOk = a.carte_t_expiration ? new Date(a.carte_t_expiration) > new Date() : null;
  var dateInscr = new Date(a.created_at).toLocaleDateString('fr-FR');

  var h = '<div class="agent-card">';
  h += '<div class="agent-header">';
  h += '<div class="agent-avatar">' + (a.nom||'A').charAt(0).toUpperCase() + '</div>';
  h += '<div class="agent-info"><div class="agent-name">' + (a.nom||'—') + '</div>';
  h += '<div class="agent-email">' + a.email + ' · Inscrit le ' + dateInscr + '</div></div>';
  h += '<div class="agent-badge ' + badgeCls + '">' + badgeTxt + '</div>';
  h += '</div>';

  h += '<div class="agent-details">';
  h += '<div class="detail-item"><div class="detail-lbl">Numéro carte T</div><div class="detail-val" style="font-size:12px;font-weight:600">' + (a.carte_t||'—') + '</div></div>';
  h += '<div class="detail-item"><div class="detail-lbl">CCI émettrice</div><div class="detail-val">' + (a.cci||'—') + '</div></div>';
  h += '<div class="detail-item"><div class="detail-lbl">Expiration</div><div class="detail-val" style="color:' + (expiOk===true?'var(--teal)':expiOk===false?'#C0392B':'var(--ink)') + '">' + (a.carte_t_expiration ? new Date(a.carte_t_expiration).toLocaleDateString('fr-FR') : '—') + (expiOk===false?' ⚠️ EXPIRÉE':'') + '</div></div>';
  h += '<div class="detail-item"><div class="detail-lbl">Agence</div><div class="detail-val">' + (a.agence||'Indépendant') + '</div></div>';
  h += '<div class="detail-item"><div class="detail-lbl">OCR résultat</div><div class="detail-val" style="font-size:11px">' + (a.ocr_statut||'Non analysé') + '</div></div>';
  h += '<div class="detail-item"><div class="detail-lbl">Vérifier sur</div><div class="detail-val"><a href="https://cartepro.cci.fr" target="_blank" style="color:var(--teal);font-size:12px">cartepro.cci.fr →</a></div></div>';
  h += '</div>';

  if (a.statut === 'en_attente') {
    h += '<div class="actions">';
    h += '<button class="btn-valid" onclick="validerAgent(\'' + a.id + '\',\'' + a.email + '\',\'' + a.user_id + '\')">✅ Valider le compte</button>';
    h += '<button class="btn-refuse" onclick="refuserAgent(\'' + a.id + '\',\'' + a.email + '\')">❌ Refuser</button>';
    h += '<a href="https://cartepro.cci.fr" target="_blank" class="btn-verify">🔍 Vérifier sur cartepro.cci.fr</a>';
    h += '</div>';
  }
  h += '</div>';
  return h;
}

async function validerAgent(id, email, userId) {
  if (!confirm('Valider le compte agent de ' + email + ' ?')) return;

  // Mettre à jour la table agents_validation
  await db.from('agents_validation').update({ statut: 'valide', valide_le: new Date().toISOString() }).eq('id', id);

  // Mettre à jour les metadata utilisateur via Edge Function
  await db.functions.invoke('valider-agent', {
    body: { user_id: userId, email: email }
  }).catch(function(){});

  // Email de confirmation à l'agent
  await db.functions.invoke('envoyer-email', {
    body: {
      type: 'compte_agent_valide',
      to: email,
      subject: '✅ Votre compte agent ImmoConnect est activé !',
      lien: 'https://immoconnect-agence.fr/connexion.html'
    }
  }).catch(function(){});

  alert('✅ Compte validé ! L\'agent a été notifié par email.');
  location.reload();
}

async function refuserAgent(id, email) {
  var raison = prompt('Raison du refus (sera envoyée à l\'agent) :');
  if (!raison) return;

  await db.from('agents_validation').update({ statut: 'refuse', raison_refus: raison }).eq('id', id);

  await db.functions.invoke('envoyer-email', {
    body: {
      type: 'compte_agent_refuse',
      to: email,
      subject: '❌ Votre inscription agent ImmoConnect',
      raison: raison,
      lien: 'https://immoconnect-agence.fr/connexion.html'
    }
  }).catch(function(){});

  alert('Refus enregistré. L\'agent a été notifié.');
  location.reload();
}
</script>
</body>
</html>
