<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Signature du mandat — ImmoConnect</title>
<style>
  :root{--ink:#1a1a1f;--navy:#0f3a6b;--gold:#C79A3A;--teal:#1f6f6b;--muted:#6b6b72;--line:#e6e6ea}
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,-apple-system,'Segoe UI',sans-serif;color:var(--ink);background:#fafafa}
  header{background:var(--navy);color:#fff;padding:14px 18px;font-weight:700}
  .wrap{max-width:920px;margin:0 auto;padding:18px}
  .card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:16px}
  h2{font-size:16px;margin:0 0 10px;color:var(--navy)}
  label{display:block;font-size:13px;color:var(--muted);margin:10px 0 4px}
  input,select{width:100%;padding:10px;border:1px solid var(--line);border-radius:8px;font-size:14px}
  button{background:var(--teal);color:#fff;border:none;border-radius:8px;padding:11px 16px;font-size:14px;font-weight:600;cursor:pointer}
  button.sec{background:#fff;color:var(--navy);border:1px solid var(--line)}
  .row{display:flex;gap:10px;flex-wrap:wrap}.row>div{flex:1;min-width:140px}
  .msg{padding:10px 12px;border-radius:8px;font-size:13px;margin-top:10px;display:none}
  .msg.err{background:#fdecec;color:#a32d2d}.msg.ok{background:#eaf6ef;color:#1f6f4b}
  iframe{width:100%;height:78vh;border:1px solid var(--line);border-radius:12px;background:#fff}
  .lien{font-size:13px;word-break:break-all;background:#f4f6f8;padding:8px 10px;border-radius:8px;margin-top:6px}
  .hint{font-size:12px;color:var(--muted);line-height:1.5}
</style>
</head>
<body>
<header>ImmoConnect — Signature de mandat</header>
<div class="wrap">

  <!-- ZONE SIGNATURE (iframe Docage marque blanche) -->
  <div class="card" id="zone-signature" style="display:none">
    <h2 id="sig-titre">Signature du mandat</h2>
    <p class="hint" id="sig-sous"></p>
    <iframe id="sig-iframe" title="Signature Docage" allow="camera; microphone"></iframe>
  </div>

  <!-- PANNEAU AGENT : créer et envoyer un mandat à signer -->
  <div class="card" id="zone-agent" style="display:none">
    <h2>Envoyer un mandat à signer</h2>
    <p class="hint">Le PDF (mentions loi Hoguet, votre carte T, formulaire de rétractation 14 jours) est généré automatiquement puis envoyé aux deux parties via Docage.</p>
    <label>ID de l'annonce (annonce_id)</label>
    <input id="f-annonce" placeholder="uuid de l'annonce">
    <div class="row">
      <div><label>Type de mandat</label>
        <select id="f-type"><option value="simple">Simple</option><option value="semi_exclusif">Semi-exclusif</option><option value="exclusif">Exclusif</option></select>
      </div>
      <div><label>Durée (mois)</label><input id="f-duree" type="number" value="3"></div>
    </div>
    <div class="row">
      <div><label>Honoraires (€)</label><input id="f-hono" type="number" placeholder="ex. 7000"></div>
      <div><label>À la charge de</label>
        <select id="f-charge"><option value="vendeur">Vendeur</option><option value="acquereur">Acquéreur</option></select>
      </div>
    </div>
    <div class="row">
      <div><label>Nom du vendeur</label><input id="f-vnom" placeholder="Prénom Nom"></div>
      <div><label>Tél. vendeur (SMS)</label><input id="f-vtel" placeholder="+336…"></div>
    </div>
    <div style="margin-top:14px"><button onclick="creerMandat()">Générer et envoyer le mandat →</button></div>
    <div class="msg err" id="a-err"></div>
    <div class="msg ok" id="a-ok"></div>
    <div id="a-liens"></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SB_URL = 'https://zxxhyefajfwqcxcfxpmg.supabase.co';
const SB_KEY = 'sb_publishable_cW5-jNMT_wq5ng4XdOYgQQ_BM6DecbM';
const { createClient } = supabase;
const db = createClient(SB_URL, SB_KEY);

const LIEN_SIGN = (memberId) => 'https://app.docage.com/transactions/Sign?transactionMemberId=' + memberId;

function afficherSignature(memberId, sousTitre) {
  document.getElementById('sig-iframe').src = LIEN_SIGN(memberId);
  document.getElementById('sig-sous').textContent = sousTitre || '';
  document.getElementById('zone-signature').style.display = 'block';
}

async function init() {
  const params = new URLSearchParams(location.search);

  // Mode 1 : lien direct de signataire
  const member = params.get('member');
  if (member) { afficherSignature(member, 'Suivez les étapes de signature ci-dessous.'); return; }

  // Session (pour les modes 2 et 3)
  const { data: { session } } = await db.auth.getSession();
  const email = session?.user?.email || null;

  // Mode 2 : lien par mandat → on choisit le bon signataire selon le rôle
  const mandatId = params.get('mandat');
  if (mandatId) {
    const { data: reg } = await db.from('registre_mandats').select('*').eq('id', mandatId).maybeSingle();
    if (!reg) { document.body.insertAdjacentHTML('beforeend', '<div class="wrap"><div class="card">Mandat introuvable ou accès non autorisé.</div></div>'); return; }
    if (email && email === reg.agent_email && reg.docage_membre_agent) return afficherSignature(reg.docage_membre_agent, 'Mandat n°' + reg.numero_mandat + ' — signature agent.');
    if (reg.docage_membre_vendeur) return afficherSignature(reg.docage_membre_vendeur, 'Mandat n°' + reg.numero_mandat + ' — signature vendeur.');
    return;
  }

  // Mode 3 : panneau agent (créer un mandat). Pré-remplit l'annonce si passée en URL.
  document.getElementById('zone-agent').style.display = 'block';
  const a = params.get('annonce'); if (a) document.getElementById('f-annonce').value = a;
}

async function creerMandat() {
  const err = document.getElementById('a-err'), ok = document.getElementById('a-ok'), liens = document.getElementById('a-liens');
  err.style.display = ok.style.display = 'none'; liens.innerHTML = '';
  const annonce = document.getElementById('f-annonce').value.trim();
  if (!annonce) { err.textContent = "Renseignez l'ID de l'annonce."; err.style.display = 'block'; return; }

  const { data: { session } } = await db.auth.getSession();
  if (!session) { err.textContent = 'Vous devez être connecté en tant qu\'agent.'; err.style.display = 'block'; return; }

  try {
    const r = await db.functions.invoke('creer-mandat-signature', { body: {
      annonce_id: annonce,
      agent_email: session.user.email,
      type_mandat: document.getElementById('f-type').value,
      duree_mois: parseInt(document.getElementById('f-duree').value) || 3,
      honoraires_montant: parseFloat(document.getElementById('f-hono').value) || null,
      honoraires_a_charge: document.getElementById('f-charge').value,
      vendeur_nom: document.getElementById('f-vnom').value.trim() || null,
      vendeur_tel: document.getElementById('f-vtel').value.trim() || null,
    }});
    const d = r?.data;
    if (!d || !d.ok) { err.textContent = 'Erreur : ' + ((d && d.error) || (r.error && r.error.message) || 'inconnue'); err.style.display = 'block'; return; }
    ok.textContent = 'Mandat n°' + d.numero_mandat + ' créé et envoyé. Liens de signature :'; ok.style.display = 'block';
    liens.innerHTML =
      '<div class="lien"><b>Agent :</b> <a href="' + d.lien_agent + '" target="_blank">' + d.lien_agent + '</a></div>' +
      '<div class="lien"><b>Vendeur :</b> <a href="' + d.lien_vendeur + '" target="_blank">' + d.lien_vendeur + '</a></div>';
  } catch (e) { err.textContent = 'Erreur : ' + e.message; err.style.display = 'block'; }
}

init();
</script>
</body>
</html>
