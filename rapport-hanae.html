<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ImmoConnect — Rapport Hanaé</title>

<style>
:root{--ink:#0F0F0E;--muted:#888780;--bg:#F5F2EC;--warm:#FEFDFB;--line:#E8E6E0;--gold:#C09B5A;--teal:#1E7A62;--blue:#185FA5;--r:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--ink);font-size:14px}
nav{background:var(--ink);height:54px;display:flex;align-items:center;padding:0 32px;position:sticky;top:0;z-index:100}
.nav-logo{font-size:18px;font-weight:600;color:#fff}.nav-logo span{color:var(--gold)}
.page{max-width:900px;margin:0 auto;padding:36px 24px 80px}

/* HEADER RAPPORT */
.rapport-header{background:var(--warm);border:1px solid var(--line);border-radius:var(--r);padding:24px 28px;margin-bottom:20px;display:flex;align-items:center;gap:20px}
.hanae-avatar{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#1E7A62,#185FA5);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.rapport-info{flex:1}
.rapport-title{font-size:18px;font-weight:500;margin-bottom:4px}
.rapport-sub{font-size:12px;color:var(--muted)}
.btn-pdf{padding:10px 22px;background:var(--ink);color:#fff;border:none;border-radius:8px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:opacity .15s;flex-shrink:0}
.btn-pdf:hover{opacity:.85}
.btn-pdf:disabled{opacity:.5;cursor:not-allowed}

/* SEARCH */
.search-box{background:var(--warm);border:1px solid var(--line);border-radius:var(--r);padding:20px;margin-bottom:20px}
.search-title{font-size:13px;font-weight:500;margin-bottom:12px}
.search-row{display:flex;gap:10px}
.search-input{flex:1;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:10px 14px;font-family:'Outfit',sans-serif;font-size:13px;color:var(--ink);outline:none}
.search-input:focus{border-color:var(--ink)}
.btn-search{padding:10px 20px;background:var(--teal);color:#fff;border:none;border-radius:8px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;cursor:pointer}

/* LOADING */
.loading{text-align:center;padding:60px 20px;color:var(--muted);font-size:13px}
.loading-spin{width:32px;height:32px;border:3px solid var(--line);border-top-color:var(--teal);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* SECTIONS RAPPORT */
.rapport-section{background:var(--warm);border:1px solid var(--line);border-radius:var(--r);margin-bottom:16px;overflow:hidden}
.rs-head{padding:14px 20px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--line);background:var(--bg)}
.rs-icon{font-size:18px}
.rs-title{font-size:13px;font-weight:600;flex:1}
.rs-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;background:#E1F5EE;color:#085041}
.rs-body{padding:20px}

/* BIEN INFO */
.bien-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.bien-stat{background:var(--bg);border-radius:8px;padding:12px;text-align:center}
.bien-stat-val{font-size:20px;font-weight:500;margin-bottom:2px}
.bien-stat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}

/* PRIX MARKET */
.prix-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px}
.prix-card{background:var(--bg);border-radius:8px;padding:14px;text-align:center}
.prix-card.featured{background:#E1F5EE;border:1px solid #9FE1CB}
.prix-val{font-size:22px;font-weight:500;color:var(--teal)}
.prix-lbl{font-size:11px;color:var(--muted);margin-top:2px}
.prix-sub{font-size:10px;color:var(--muted);margin-top:4px}

/* VENTES TABLE */
.ventes-table{width:100%;border-collapse:collapse;font-size:12px}
.ventes-table th{padding:8px 12px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);background:var(--bg);border-bottom:1px solid var(--line);font-weight:600}
.ventes-table td{padding:9px 12px;border-bottom:1px solid var(--line);color:var(--muted)}
.ventes-table td:first-child{color:var(--ink);font-weight:500}
.ventes-table tr:last-child td{border-bottom:none}
.ventes-table tr:hover td{background:#F9F7F2}
.td-green{color:var(--teal)!important;font-weight:600!important}
.td-avg{background:var(--bg);font-weight:600!important}

/* RENDEMENT */
.rdt-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.rdt-box{background:var(--bg);border-radius:8px;padding:14px}
.rdt-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:8px}
.rdt-val{font-size:24px;font-weight:500;color:var(--teal);margin-bottom:4px}
.rdt-detail{font-size:11px;color:var(--muted);line-height:1.6}

/* FRAIS NOTAIRE */
.fn-box{background:#FAEEDA;border:1px solid rgba(192,155,90,.3);border-radius:8px;padding:14px;margin-bottom:12px}
.fn-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:#854F0B;margin-bottom:8px}
.fn-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(192,155,90,.2);font-size:12px}
.fn-row:last-child{border-bottom:none;font-weight:600;font-size:13px}
.fn-lbl{color:#854F0B}
.fn-val{color:#633806;font-weight:600}

/* SYNTHESE HANAE */
.hanae-synthese{font-size:13px;line-height:1.75;color:var(--ink)}
.syn-title{font-size:18px;font-weight:600;color:var(--ink);margin:0 0 4px;line-height:1.3}
.syn-subtitle{font-size:12px;color:var(--muted);font-style:italic;margin:0 0 16px}
.syn-section{background:var(--bg);border:1px solid var(--line);border-left:3px solid var(--teal);border-radius:10px;padding:14px 16px;margin:0 0 12px}
.syn-section-head{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.5px;margin:0 0 8px}
.syn-ico{font-size:16px;line-height:1}
.syn-p{font-size:13px;line-height:1.75;color:var(--ink);margin:0 0 8px}
.syn-section .syn-p:last-child{margin-bottom:0}
.syn-hr{border:none;border-top:1px solid var(--line);margin:14px 0}
.hanae-synthese strong{font-weight:600;color:var(--ink)}
.hanae-synthese em{color:var(--muted);font-style:italic}
.hanae-typing{display:inline-block;width:8px;height:16px;background:var(--teal);animation:blink .8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* INSEE */
.insee-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.insee-block{background:var(--bg);border-radius:8px;padding:12px}
.insee-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:8px}
.insee-row{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;border-bottom:1px solid var(--line)}
.insee-row:last-child{border-bottom:none}
.insee-lbl{color:var(--muted)}
.insee-val{font-weight:500;color:var(--ink)}

/* DISCLAIMER */
.disclaimer{font-size:10px;color:var(--muted);line-height:1.6;padding:12px 16px;background:var(--bg);border-radius:8px;margin-top:8px;border:1px solid var(--line)}

.empty{text-align:center;padding:40px;color:var(--muted);font-size:13px}
hr.div{border:none;border-top:1px solid var(--line);margin:14px 0}

@media(max-width:600px){.bien-grid,.prix-grid,.rdt-grid,.insee-grid{grid-template-columns:1fr 1fr}.rapport-header{flex-wrap:wrap}}
</style>

<div class="page">

  <div class="rapport-header">
    <div class="hanae-avatar">🤖</div>
    <div class="rapport-info">
      <div class="rapport-title">Hanaé — Agent IA ImmoConnect</div>

<script>
const SUPABASE_URL  = 'https://zxxhyefajfwqcxcfxpmg.supabase.co';
const SUPABASE_ANON = 'sb_publishable_cW5-jNMT_wq5ng4XdOYgQQ_BM6DecbM';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON);

var rapportData = null;

/* ══ INCRÉMENTATION VUES ══ */
async function incrementerVues(annonceId, emailVendeur) {
  try {
    // Vérifier si c\'est le propriétaire qui consulte
    var { data: { session } } = await db.auth.getSession();
    if (session && session.user && session.user.email === emailVendeur) return;

    // Incrémenter nb_vues avec une fonction RPC Supabase
    var { error } = await db.rpc('incrementer_vues', { annonce_uuid: annonceId });
    if (error) {
      // Fallback si RPC pas encore créée : lecture puis écriture
      var { data: ann } = await db.from('annonces_vendeurs')
        .select('nb_vues').eq('id', annonceId).single();
      if (ann) {
        await db.from('annonces_vendeurs')
          .update({ nb_vues: (ann.nb_vues || 0) + 1 })
          .eq('id', annonceId);
      }
    }
  } catch(e) {
    // Silencieux — ne pas bloquer l\'affichage du rapport
    console.warn('Vues increment:', e.message);
  }
}

/* ══ CHARGEMENT RAPPORT ══ */
async function chargerRapport() {
  var id = document.getElementById('annonce-id').value.trim();
  if (!id) return;

  document.getElementById('rapport-content').innerHTML = '<div class="loading"><div class="loading-spin"></div>Chargement des données…</div>';
  document.getElementById('btn-pdf').disabled = true;

  try {
    // 1. Charger l\'annonce depuis Supabase
    var { data: annonce, error } = await db.from('annonces_vendeurs').select('*').eq('id', id).single();
    if (error || !annonce) {
      // Essai par code postal
      var { data: annonces } = await db.from('annonces_vendeurs').select('*').eq('code_postal', id).order('created_at', {ascending:false}).limit(1);
      annonce = annonces && annonces[0];
    }
    if (!annonce) { document.getElementById('rapport-content').innerHTML = '<div class="empty">Annonce introuvable</div>'; return; }

    // ── INCRÉMENTER LES VUES (ne pas compter le propriétaire) ──
    await incrementerVues(annonce.id, annonce.email_contact);

    document.getElementById('rapport-content').innerHTML = '<div class="loading"><div class="loading-spin"></div>Récupération données DVF…</div>';

    // 2. Récupérer données DVF — sources multiples
    document.getElementById('rapport-content').innerHTML = '<div class="loading"><div class="loading-spin"></div>Récupération données DVF Etalab…</div>';
    var dvf = await fetchDVF(annonce.code_postal, annonce.type_bien, annonce.surface, annonce.ville);

    // 2b. DVF+ CEREMA (géolocalisé, plus précis) — fallback silencieux si indisponible
    document.getElementById('rapport-content').innerHTML = '<div class="loading"><div class="loading-spin"></div>Récupération DVF+ CEREMA géolocalisé…</div>';
    var dvfCerema = await fetchDVFCerema(annonce.code_postal, annonce.type_bien, annonce.surface);
    // Si CEREMA disponible et avec suffisamment de données → enrichit DVF
    if (dvfCerema && dvfCerema.nbVentes >= 3) {
      dvf.prixM2Cerema = dvfCerema.prixM2Moyen;
      dvf.nbVentesCerema = dvfCerema.nbVentes;
      dvf.sourceCerema = dvfCerema.source;
    }

    // 2c. Baromètre local SeLoger/MeilleursAgents (table statique par dépt)
    var barometre = getBarometreLocal(annonce.code_postal, annonce.type_bien);

    // 2d. Annonces actives Stream Estate/Melo (placeholder — activable avec clé API)
    var annoncesActives = await fetchAnnoncesActives(annonce.code_postal, annonce.type_bien, annonce.surface, annonce.prix);

    document.getElementById('rapport-content').innerHTML = '<div class="loading"><div class="loading-spin"></div>Récupération données INSEE + loyers + indices…</div>';

    // 3. Récupérer données INSEE
    var insee = await fetchINSEE(annonce.code_postal);

    // 3b. Carte des loyers
    var loyers = await fetchLoyers(insee.code, annonce.type_bien);

    // 3c. Indice Notaires-INSEE
    var dept = annonce.code_postal ? annonce.code_postal.substring(0,2) : '75';
    var indice = await fetchIndiceNotaires(annonce.type_bien, dept);

    // 4b. Biens similaires en vente sur ImmoConnect (même secteur)
    var biensComparatifs = await fetchBiensSimilaires(annonce);

    // 4. Calculs enrichis
    // Calculer prix/m² moyen des annonces ImmoConnect pour enrichir le composite
    var prixM2ImmoConnect = 0;
    if (biensComparatifs && biensComparatifs.length >= 3) {
      var prixM2IC = biensComparatifs
        .filter(function(b){ return b.prix && b.surface; })
        .map(function(b){ return b.prix / b.surface; });
      if (prixM2IC.length >= 3) {
        prixM2ImmoConnect = Math.round(prixM2IC.reduce(function(a,b){return a+b},0) / prixM2IC.length);
        dvf.prixM2ImmoConnect = prixM2ImmoConnect;
      }
    }

    // Injecter baromètre FNAIM/SeLoger dans dvf
    var prixFNAIM = barometre ? barometre.prixM2Moyen : 0;
    dvf.prixM2Barometre = prixFNAIM;

    // Injecter CEREMA dans dvf si disponible
    if (dvfCerema && dvfCerema.prixM2Moyen) dvf.prixM2Cerema = dvfCerema.prixM2Moyen;

    var calculs = calculer(annonce, dvf, loyers, indice, dvfCerema, prixFNAIM, prixM2ImmoConnect);

    // 5. Stocker
    var dept = annonce.code_postal ? annonce.code_postal.substring(0,2) : '';
    var barometre = prixFNAIM > 0 ? { prixM2Moyen: prixFNAIM, departement: 'Dept ' + dept, miseAJour: 'Mai 2026' } : null;
    rapportData = { annonce, dvf, dvfCerema, prixFNAIM, prixImmoConnect: prixM2ImmoConnect, barometre, insee, calculs, biensComparatifs };

    document.getElementById('rapport-content').innerHTML = '<div class="loading"><div class="loading-spin"></div>Hanaé rédige la synthèse…</div>';

    // 6. Synthèse Hanaé via Claude
    var synthese = await genererSynthese(annonce, dvf, calculs);

    rapportData.synthese = synthese;

    // 7. Afficher
    afficherRapport(rapportData);
    document.getElementById('btn-pdf').disabled = false;

    // Afficher bouton visite si niveau Silver, Gold ou Platinium
    var niv = rapportData.annonce.niveau_vendeur || 'standard';
    if (['silver','gold','platinium'].includes(niv)) {
      var bv = document.getElementById('btn-visite');
      if (bv) bv.style.display = 'inline-block';
    }

  } catch(e) {
    document.getElementById('rapport-content').innerHTML = '<div class="empty">Erreur : ' + e.message + '</div>';
  }
}

/* ══ MODAL CALENDRIER VISITES ══ */
function ouvrirCalendrier() {
  var annonce = rapportData && rapportData.annonce;
  if (!annonce) return;

  // Créer modal calendrier
  var modal = document.getElementById('modal-calendrier');
  if (!modal) {
    modal = document.createElement('div');
    modal.id = 'modal-calendrier';
    modal.style.cssText = 'position:fixed;inset:0;background:rgba(15,15,14,.6);backdrop-filter:blur(4px);z-index:999;display:flex;align-items:center;justify-content:center;padding:24px';
    document.body.appendChild(modal);
  }

  modal.innerHTML = '<div style="background:#FEFDFB;border-radius:10px;padding:0;max-width:560px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)">' +
    '<div style="padding:20px 24px;border-bottom:1px solid #E8E6E0;display:flex;align-items:center;justify-content:space-between">' +
    '<div>' +
    '<div style="font-size:16px;font-weight:500;color:#0F0F0E">📅 Réserver une visite</div>' +
    '<div style="font-size:12px;color:#888780;margin-top:2px">' + (annonce.type_bien||'Bien') + ' · ' + (annonce.surface||'—') + ' m² · ' + (annonce.ville||'') + '</div>' +
    '</div>' +
    '<button onclick="fermerCalendrier()" style="border:none;background:none;font-size:20px;cursor:pointer;color:#888780;padding:4px">×</button>' +
    '</div>' +
    '<div id="cal-modal-content" style="padding:20px 24px">' +
    '<div style="text-align:center;padding:20px;color:#888780;font-size:13px">' +
    '<div style="width:24px;height:24px;border:3px solid #E8E6E0;border-top-color:#1E7A62;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px"></div>' +
    'Chargement des disponibilités…</div></div>' +
    '</div>';

  modal.style.display = 'flex';
  chargerDisposVendeur(annonce.email_contact, annonce.id);
}

async function chargerDisposVendeur(emailVendeur, annonceId) {
  try {
    var today = new Date().toISOString().split('T')[0];
    var { data: dispos } = await db.from('disponibilites_visites')
      .select('*')
      .eq('email_vendeur', emailVendeur)
      .eq('annonce_id', annonceId)
      .eq('statut', 'libre')
      .gte('date', today)
      .order('date', {ascending: true})
      .limit(20);

    var container = document.getElementById('cal-modal-content');
    if (!dispos || !dispos.length) {
      container.innerHTML = '<div style="text-align:center;padding:32px;color:#888780;font-size:13px">' +
        '<div style="font-size:32px;margin-bottom:12px">📅</div>' +
        'Aucun créneau disponible pour le moment.<br>Contactez le vendeur via la messagerie.' +
        '</div>';
      return;
    }

    var html = '<div style="font-size:13px;color:#888780;margin-bottom:16px">Choisissez un créneau disponible :</div>';

    // Grouper par date
    var parDate = {};
    dispos.forEach(function(d) {
      if (!parDate[d.date]) parDate[d.date] = [];
      parDate[d.date].push(d);
    });

    Object.keys(parDate).forEach(function(date) {
      var dateObj = new Date(date + 'T12:00:00');
      var opts = {weekday:'long', day:'numeric', month:'long'};
      html += '<div style="margin-bottom:16px">';
      html += '<div style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:#888780;margin-bottom:8px">' +
        dateObj.toLocaleDateString('fr-FR', opts) + '</div>';
      html += '<div style="display:flex;flex-wrap:wrap;gap:8px">';
      parDate[date].forEach(function(d) {

/* ══ BIENS SIMILAIRES EN VENTE ══ */
async function fetchBiensSimilaires(annonce) {
  try {
    var cp = annonce.code_postal || '';
    var dept = cp.substring(0, 2);
    var surface = parseFloat(annonce.surface) || 0;
    var prix = parseFloat(annonce.prix) || 0;
    var type = (annonce.type_bien || '').toLowerCase();

    // Chercher biens publiés dans le même département, type similaire, exclure le bien courant
    var query = db.from('annonces_vendeurs')
      .select('id, type_bien, surface, nb_pieces, ville, code_postal, prix, classe_dpe, niveau_vendeur, created_at')
      .eq('statut', 'publie')
      .like('code_postal', dept + '%')
      .neq('id', annonce.id)
      .gt('prix', 0)
      .order('created_at', { ascending: false })
      .limit(30);

    var { data } = await query;
    if (!data || !data.length) return [];

    // Filtrer : même type et surface ±40%
    var filtres = data.filter(function(b) {
      var bType = (b.type_bien || '').toLowerCase();
      var typeOk = !type || type === 'indifferent' ||
        bType.includes(type.split(' ')[0]) ||
        type.includes(bType.split(' ')[0]);
      var surfaceOk = !surface || !b.surface ||
        (parseFloat(b.surface) >= surface * 0.6 && parseFloat(b.surface) <= surface * 1.4);
      return typeOk && surfaceOk;
    });

    // Trier par pertinence (surface la plus proche)
    filtres.sort(function(a, b) {
      var dA = Math.abs((parseFloat(a.surface) || 0) - surface);
      var dB = Math.abs((parseFloat(b.surface) || 0) - surface);
      return dA - dB;
    });

    return filtres.slice(0, 6);
  } catch(e) {
    return [];
  }
}

/* ══ API DVF OFFICIELLE ══ */
/* ══ DVF+ CEREMA — VERSION GÉOLOCALISÉE ══ */
async function fetchDVFCerema(codePostal, typeBien, surface) {
  try {
    // DVF+ CEREMA : données DVF géolocalisées et enrichies
    // https://www.data.gouv.fr/dataservices/api-donnees-foncieres
    var typeCode = typeBien && typeBien.toLowerCase().includes('maison') ? 'Maison' : 'Appartement';
    var url = 'https://apidf-preprod.cerema.fr/dvf_opendata/geomutations/?code_postal=' + codePostal
      + '&type_local=' + encodeURIComponent(typeCode)
      + '&periode_min=2021-01-01'
      + '&limit=100';
    var res = await fetch(url);
    if (!res.ok) throw new Error('CEREMA ' + res.status);
    var data = await res.json();
    var mutations = data.features || data.results || [];

    var surf = parseFloat(surface) || 50;
    var similaires = mutations.filter(function(m) {
      var props = m.properties || m;
      var s = props.surface_reelle_bati || props.surface;
      var v = props.valeur_fonciere || props.prix;
      return s && s >= surf * 0.65 && s <= surf * 1.35 && v > 0;
    });

    var prixM2 = similaires.map(function(m) {
      var props = m.properties || m;
      var s = props.surface_reelle_bati || props.surface;
      var v = props.valeur_fonciere || props.prix;
      return v / s;
    }).filter(function(v) { return v > 500 && v < 25000; });

    var moy = function(arr) { return arr.length ? arr.reduce(function(a,b){return a+b},0)/arr.length : 0; };
    var med = function(arr) {
      if (!arr.length) return 0;
      var s = arr.slice().sort(function(a,b){return a-b});
      return s[Math.floor(s.length/2)];
    };

    if (similaires.length < 3) return null; // Pas assez de données CEREMA
    return {
      prixM2Moyen: Math.round(moy(prixM2)),
      prixM2Median: Math.round(med(prixM2)),
      nbVentes: similaires.length,
      source: 'DVF+ CEREMA géolocalisé'
    };
  } catch(e) {
    return null; // Fallback silencieux vers DVF Etalab
  }
}

function parseDVFCsv(txt){
  var lines = txt.split(/\r?\n/);
  if (lines.length < 2) return [];
  var head = lines[0].split(','); var idx = {};
  head.forEach(function(h,i){ idx[h.trim()] = i; });
  var out = [];
  for (var k=1;k<lines.length;k++){
    if (!lines[k]) continue;
    var col = lines[k].split(',');
    out.push({
      id_mutation: col[idx['id_mutation']],
      date_mutation: col[idx['date_mutation']],
      nature_mutation: col[idx['nature_mutation']],
      valeur_fonciere: parseFloat(col[idx['valeur_fonciere']]) || 0,
      type_local: col[idx['type_local']],
      surface_reelle_bati: parseFloat(col[idx['surface_reelle_bati']]) || 0
    });
  }
  return out;
}

async function fetchDVF(codePostal, typeBien, surface, ville) {
  var EMPTY = { similaires:[], prixMoyen:0, prixMedian:0, prixM2Moyen:0, prixM2Median:0, nbVentes:0, historique:[], source:'DVF indisponible' };
  try {
    var typeCode = typeBien && typeBien.toLowerCase().includes('maison') ? 'Maison' : 'Appartement';
    var surf = parseFloat(surface) || 50;

    // 1) Resoudre le code INSEE + departement (le DVF s'interroge par code commune, jamais par code postal)
    var geo = await fetch('https://geo.api.gouv.fr/communes?codePostal=' + codePostal + '&fields=nom,code,codeDepartement&format=json').then(function(r){ return r.json(); });
    if (!geo || !geo.length) return EMPTY;
    var commune = geo[0];
    if (ville && geo.length > 1) {
      var norm = function(s){ return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z]/g,''); };
      var match = geo.filter(function(co){ return norm(co.nom) === norm(ville); })[0];
      if (match) commune = match;
    }
    var insee = commune.code, dept = commune.codeDepartement;
    if (!insee || !dept) return EMPTY;

    // 2) Lire les mutations geo-DVF officielles Etalab (fichiers par commune / annee)
    var mutations = [], annees = ['2020','2021','2022','2023','2024'], seen = {};
    for (var a=0;a<annees.length;a++){
      try {
        var csvUrl = 'https://files.data.gouv.fr/geo-dvf/latest/csv/' + annees[a] + '/communes/' + dept + '/' + insee + '.csv';
        var resp = await fetch(csvUrl);
        if (resp.ok){
          var txt = await resp.text();
          parseDVFCsv(txt).forEach(function(m){
            // dedoublonnage par mutation (les lots multiples repetent la meme vente)
            var key = (m.id_mutation||'') + '|' + (m.surface_reelle_bati||'');
            if (!seen[key]){ seen[key]=1; mutations.push(m); }
          });
        }
      } catch(e){}
    }

    // 3) Repli JSON (api.cquest.org) si aucun fichier exploitable
    if (!mutations.length) {
      try {
        var cq = await fetch('https://api.cquest.org/dvf?code_commune=' + insee).then(function(r){ return r.json(); });
        var rs = (cq && (cq.resultats || cq.features)) || [];
        mutations = rs.map(function(m){ var p = m.properties || m; return {
          id_mutation: p.id_mutation, date_mutation: p.date_mutation, nature_mutation: p.nature_mutation,
          valeur_fonciere: parseFloat(p.valeur_fonciere)||0, type_local: p.type_local,
          surface_reelle_bati: parseFloat(p.surface_reelle_bati)||0 }; });
      } catch(e){}
    }

    // 4) Filtrer : ventes du bon type, surface +/-30 %, valeur valide
    var similaires = mutations.filter(function(m){
      return m.nature_mutation === 'Vente' && m.type_local === typeCode &&
             m.valeur_fonciere > 0 && m.surface_reelle_bati &&
             m.surface_reelle_bati >= surf*0.7 && m.surface_reelle_bati <= surf*1.3;
    });
    if (!similaires.length) return Object.assign({}, EMPTY, { source: 'geo-DVF Etalab - aucune vente comparable (commune ' + insee + ')' });

    var prix = similaires.map(function(m){ return m.valeur_fonciere; });
    var prixM2 = similaires.map(function(m){ return m.valeur_fonciere / m.surface_reelle_bati; }).filter(function(v){ return v>0 && v<20000; });
    var moy = function(arr){ return arr.length ? arr.reduce(function(x,y){return x+y;},0)/arr.length : 0; };
    var med = function(arr){ if(!arr.length) return 0; var s=arr.slice().sort(function(x,y){return x-y;}); return s[Math.floor(s.length/2)]; };

    var parAnnee = {};
    similaires.forEach(function(m){
      var annee = (m.date_mutation||'').substring(0,4);
      if (annee >= '2019'){ if(!parAnnee[annee]) parAnnee[annee]=[]; parAnnee[annee].push(m.valeur_fonciere/m.surface_reelle_bati); }
    });
    var historique = Object.keys(parAnnee).sort().map(function(an){ return { annee:an, prixM2:Math.round(moy(parAnnee[an])), nb:parAnnee[an].length }; });

    return {
      similaires: similaires.slice(0,8).map(function(m){ return { properties:{ valeur_fonciere:m.valeur_fonciere, surface_reelle_bati:m.surface_reelle_bati, date_mutation:m.date_mutation, type_local:m.type_local } }; }),
      prixMoyen: Math.round(moy(prix)),
      prixMedian: Math.round(med(prix)),
      prixM2Moyen: Math.round(moy(prixM2)),
      prixM2Median: Math.round(med(prixM2)),
      nbVentes: similaires.length,
      historique: historique,
      source: 'geo-DVF Etalab - DGFiP (commune ' + insee + ')'
    };
  } catch(e){ return EMPTY; }
}

    var indices = {

      },

      }
    };

/* ══ CALCULS ENRICHIS (3 sources) ══ */
function calculer(annonce, dvf, loyers, indice, dvfCerema, prixFNAIM, prixImmoConnect) {
  loyers = loyers || { loyerM2Min:8, loyerM2Max:14, loyerM2Moyen:11 };
  indice = indice || { tendance2024:-2.5, tendance2023:-4.1, correctionPct:-0.025 };

  var prix = parseFloat(annonce.prix) || 0;
  var surface = parseFloat(annonce.surface) || 1;
  var loyer = parseFloat(annonce.loyer_mensuel) || 0;
  var valeurLoc = parseFloat(annonce.valeur_locative) || 0;
  var taxeFonc = parseFloat(annonce.taxe_fonciere_montant) || 0;
  var charges = parseFloat(annonce.charges_syndic) || 0;

  // ── SOURCE 1 : DVF ──
  var prixM2 = prix / surface;
  var prixM2DVF = dvf.prixM2Moyen || 0;

  // ── SOURCE 2 : Correction indice Notaires-INSEE ──
  // DVF a 6 mois de retard → corriger selon tendance récente
  var prixM2DVFCorrige = prixM2DVF > 0 ? Math.round(prixM2DVF * (1 + indice.correctionPct)) : 0;

  // ── SOURCE 3 : Carte des loyers → loyer de marché estimé ──
  var loyerMarcheEstime = Math.round(loyers.loyerM2Moyen * surface);
  var loyerMarcheMin = Math.round(loyers.loyerM2Min * surface);
  var loyerMarcheMax = Math.round(loyers.loyerM2Max * surface);

  // ── PRIX COMPOSITE — jusqu\'à 5 sources pondérées ──
  // Source 1 : DVF corrigé Notaires-INSEE (référence principale)
  // Source 2 : DVF brut
  // Source 3 : DVF+ CEREMA (géolocalisé, si disponible)
  // Source 4 : Baromètre FNAIM/SeLoger (par département, mensuel)
  // Source 5 : Annonces ImmoConnect actives (si ≥3 biens similaires)
  dvfCerema = dvfCerema || null;
  prixFNAIM = prixFNAIM || 0;
  prixImmoConnect = prixImmoConnect || 0;
  var prixM2CEREMA = dvfCerema ? (dvfCerema.prixM2Median || 0) : 0;

  var prixM2Marche = 0;
  var nbSources = 0;
  var sourcesPrix = [];

  // Construction pondérée selon les sources disponibles
  if (prixM2DVFCorrige > 0) { sourcesPrix.push({ val: prixM2DVFCorrige, poids: 3 }); nbSources++; }
  if (prixM2DVF > 0)        { sourcesPrix.push({ val: prixM2DVF,        poids: 2 }); nbSources++; }
  if (prixM2CEREMA > 0)     { sourcesPrix.push({ val: prixM2CEREMA,     poids: 2 }); nbSources++; }
  if (prixFNAIM > 0)        { sourcesPrix.push({ val: prixFNAIM,        poids: 1 }); nbSources++; }
  if (prixImmoConnect > 0)  { sourcesPrix.push({ val: prixImmoConnect,  poids: 1 }); nbSources++; }

  if (sourcesPrix.length > 0) {
    var totalPoids = sourcesPrix.reduce(function(s, x){ return s + x.poids; }, 0);
    prixM2Marche = Math.round(
      sourcesPrix.reduce(function(s, x){ return s + x.val * x.poids; }, 0) / totalPoids
    );
  } else {
    prixM2Marche = prixM2; // fallback : prix demandé
  }

  var ecartMarche = prixM2Marche > 0 ? ((prixM2 - prixM2Marche) / prixM2Marche * 100) : 0;

  // ── LOYER ──
  // Priorité : loyer saisi par le vendeur → sinon estimation carte des loyers
  var loyerAnnuel = loyer > 0 ? loyer * 12 : (valeurLoc > 0 ? valeurLoc : loyerMarcheEstime * 12);
  var loyerSource = loyer > 0 ? 'Loyer réel vendeur' : (valeurLoc > 0 ? 'Valeur locative cadastrale' : 'Estimation carte des loyers');

  // ── RENDEMENTS ──
  var rendementBrut = prix > 0 && loyerAnnuel > 0 ? (loyerAnnuel / prix * 100) : 0;
  var chargesAnnuelles = (charges * 12) + taxeFonc;
  var rendementNet = prix > 0 && loyerAnnuel > 0 ? ((loyerAnnuel - chargesAnnuelles) / prix * 100) : 0;
  // Rendement marché (si le bien était au prix du marché)
  var rendementMarcheEstime = prixM2Marche > 0 ? ((loyerMarcheEstime * 12) / (prixM2Marche * surface) * 100) : 0;

  // ── FRAIS DE NOTAIRE ──
  var anneeConst = parseInt(annonce.annee_construction) || 0;
  var tauxNotaire = anneeConst >= 2020 ? 0.03 : 0.075;
  var fraisNotaire = prix * tauxNotaire;
  var droitsMutation = prix * (tauxNotaire * 0.75);
  var emolumentNotaire = prix * (tauxNotaire * 0.15);
  var debours = prix * (tauxNotaire * 0.1);
  var prixTotal = prix + fraisNotaire;

  // ── FOURCHETTE ESTIMATION COMPOSITE ──
  // Bas : DVF brut -5% / Haut : DVF corrigé +5%
  // Fourchette : base = meilleure source disponible
  var basesBas = [prixM2DVF, prixM2CEREMA, prixFNAIM].filter(function(v){ return v > 0; });
  var basesHaut = [prixM2DVFCorrige, prixM2CEREMA, prixFNAIM].filter(function(v){ return v > 0; });
  var refBas = basesBas.length ? Math.min.apply(null, basesBas) : prixM2Marche;
  var refHaut = basesHaut.length ? Math.max.apply(null, basesHaut) : prixM2Marche;
  var fourchetteBas = Math.round(refBas * surface * 0.95);
  var fourchettHaut = Math.round(refHaut * surface * 1.05);

  // ── SCORE DE PERTINENCE DU PRIX ──
  var score = 'Correct';
  var scoreColor = '#D4732A';
  if (ecartMarche < -10) { score = 'Sous-évalué'; scoreColor = '#1E7A62'; }
  else if (ecartMarche > 10) { score = 'Surévalué'; scoreColor = '#C0392B'; }
  else if (Math.abs(ecartMarche) <= 5) { score = 'Prix marché'; scoreColor = '#1E7A62'; }

  return {
    // Prix
    prixM2: Math.round(prixM2),
    prixM2DVF: Math.round(prixM2DVF),
    prixM2DVFCorrige: Math.round(prixM2DVFCorrige),
    prixM2Marche: Math.round(prixM2Marche),
    ecartMarche: Math.round(ecartMarche),
    score, scoreColor,
    // Loyers
    loyerAnnuel: Math.round(loyerAnnuel),
    loyerSource,
    loyerMarcheMin, loyerMarcheMax, loyerMarcheEstime,
    loyerM2Min: loyers.loyerM2Min,
    loyerM2Max: loyers.loyerM2Max,
    loyerM2Moyen: loyers.loyerM2Moyen,
    // Rendements
    rendementBrut: rendementBrut.toFixed(2),
    rendementNet: rendementNet.toFixed(2),
    rendementMarcheEstime: rendementMarcheEstime.toFixed(2),
    chargesAnnuelles: Math.round(chargesAnnuelles),
    // Notaire
    tauxNotaire: (tauxNotaire * 100).toFixed(1),
    fraisNotaire: Math.round(fraisNotaire),
    droitsMutation: Math.round(droitsMutation),
    emolumentNotaire: Math.round(emolumentNotaire),
    debours: Math.round(debours),
    prixTotal: Math.round(prixTotal),
    typeNotaire: anneeConst >= 2020 ? 'Neuf (construction récente)' : 'Ancien',
    // Fourchette
    fourchetteBas, fourchettHaut,
    // Tendances
    tendance2024: indice.tendance2024,
    tendance2023: indice.tendance2023,
    // Sources utilisées pour le composite
    prixM2CEREMA: Math.round(prixM2CEREMA),
    prixFNAIM: Math.round(prixFNAIM),
    prixImmoConnect: Math.round(prixImmoConnect),
    nbSources: sourcesPrix.length
  };
}

/* ══ SYNTHÈSE HANAÉ (Claude API) ══ */
function formatSynthese(md){
  if(!md) return '';
  var esc = String(md).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  function inline(t){ return t.replace(/\*\*([^*]+?)\*\*/g,'<strong>$1</strong>').replace(/\*([^*]+?)\*/g,'<em>$1</em>'); }
  function icon(title){
    var t = title.toLowerCase();
    if(/m[ée]thodolog/.test(t)) return '\ud83d\udcca';
    if(/position|prix|valeur/.test(t)) return '\ud83c\udff7\ufe0f';
    if(/locatif|rendement|loyer/.test(t)) return '\ud83d\udcb0';
    if(/conclusion|synth|recommand/.test(t)) return '\u2705';
    if(/alentour|quartier|environ|secteur/.test(t)) return '\ud83d\udccd';
    return '\u2022';
  }
  var lines = esc.split(/\n+/).map(function(l){ return l.trim(); }).filter(Boolean);
  var out=''; var inSection=false; var titleDone=false;
  function closeSection(){ if(inSection){ out+='</div>'; inSection=false; } }
  lines.forEach(function(line){
    if(/^-{3,}$/.test(line)) return;
    var hm = line.match(/^#{1,6}\s+(.*)$/);
    if(hm){ closeSection(); out += '<div class="syn-title">'+inline(hm[1])+'</div>'; titleDone=true; return; }
    var sm = line.match(/^\*\*(.+?)\*\*\s*(.*)$/);
    if(sm && sm[1].length<70){
      closeSection();
      out += '<div class="syn-section"><div class="syn-section-head"><span class="syn-ico">'+icon(sm[1])+'</span>'+inline(sm[1])+'</div>';
      inSection=true;
      if(sm[2]) out += '<p class="syn-p">'+inline(sm[2])+'</p>';
      return;
    }
    if(titleDone && !inSection && /^\*[^*].*[^*]\*$/.test(line)){
      out += '<div class="syn-subtitle">'+inline(line.replace(/^\*|\*$/g,''))+'</div>'; return;
    }
    out += '<p class="syn-p">'+inline(line)+'</p>';
  });
  closeSection();
  return out;
}

    html += '</div></div>';
  }

  // ── SECTION 3b : BIENS SIMILAIRES EN VENTE ──
  var biens = d.biensComparatifs || [];
  var fmt2 = fmt;
  html += '<div class="rapport-section">';
  html += '<div class="rs-head"><span class="rs-icon">🏘️</span><span class="rs-title">Biens similaires actuellement en vente</span><span class="rs-badge">ImmoConnect · Marché actuel</span></div>';

    var prixM2Bien = a.prix && a.surface ? Math.round(a.prix / a.surface) : 0;

    var concPrixM2 = biens.map(function(b){ return b.prix && b.surface ? b.prix / b.surface : 0; }).filter(Boolean);
    var moyConc = concPrixM2.length ? Math.round(concPrixM2.reduce(function(s,v){ return s+v; }, 0) / concPrixM2.length) : 0;

    // Résumé positionnement
    if (prixM2Bien && moyConc) {
      var ecartConc = Math.round((prixM2Bien - moyConc) / moyConc * 100);
      var posColor = Math.abs(ecartConc) <= 5 ? '#0F6E56' : ecartConc > 5 ? '#C0392B' : '#1E7A62';
      var posLabel = Math.abs(ecartConc) <= 5 ? 'Dans la moyenne du marché actuel' : ecartConc > 5 ? 'Au-dessus du marché actuel (+' + ecartConc + '%)' : 'En-dessous du marché actuel (' + ecartConc + '%)';

      var diffHtml = diff !== null

        : '—';
      var dpeColor = {'A':'#0D7A5F','B':'#3A9E6A','C':'#8CC63F','D':'#F9C52A','E':'#F4831F','F':'#E64C2A','G':'#C0392B'}[b.classe_dpe] || 'var(--muted)';
      var lienBien = 'https://immoconnect-agence.fr/bien.html?id=' + b.id;
      html += '<tr>';

      html += '<td>' + (bPrixM2 ? bPrixM2.toLocaleString('fr-FR') + ' €' : '—') + '</td>';
      html += '<td><span style="font-weight:600;color:' + dpeColor + '">' + (b.classe_dpe || '—') + '</span></td>';
      html += '<td>' + diffHtml + '</td>';
      html += '</tr>';
    });
    html += '</tbody></table>';
    html += '<div class="disclaimer">Biens publiés sur ImmoConnect dans le même secteur (même département, type et surface similaires). Cliquez sur un bien pour voir sa fiche complète.</div>';
  }
  html += '</div></div>';

  // ── SECTION 4 : RENDEMENT ──
  html += '<div class="rapport-section">';
  html += '<div class="rs-head"><span class="rs-icon">📈</span><span class="rs-title">Rendement locatif</span><span class="rs-badge">Calcul Hanaé</span></div>';

    html += '<div class="rdt-box"><div class="rdt-title">Rendement net</div><div class="rdt-val">' + c.rendementNet + ' %</div><div class="rdt-detail">Charges annuelles : ' + fmt(c.chargesAnnuelles) + ' €<br>Taxe foncière : ' + fmt(a.taxe_fonciere_montant) + ' €<br>Charges syndic : ' + fmt((a.charges_syndic||0)*12) + ' €/an</div></div>';
    html += '</div>';
    html += '<div style="background:var(--bg);border-radius:8px;padding:12px;font-size:12px;color:var(--muted);line-height:1.6">';
    html += '💡 <strong style="color:var(--ink)">Interprétation :</strong> Un rendement brut supérieur à 5% est généralement considéré comme attractif pour un investissement locatif. ';
    if (parseFloat(c.rendementBrut) >= 5) {
      html += '<span style="color:var(--teal)">Ce bien présente un rendement intéressant pour les investisseurs.</span>';
    } else if (parseFloat(c.rendementBrut) >= 3) {
      html += '<span style="color:#D4732A">Ce bien présente un rendement modéré, dans la moyenne du marché.</span>';
    } else {
      html += '<span style="color:#C0392B">Ce bien présente un faible rendement locatif.</span>';
    }
    html += '</div>';
  } else {
    html += '<div style="color:var(--muted);font-size:13px;padding:10px">Aucun loyer renseigné — le calcul de rendement n\'est pas disponible pour ce bien.</div>';
  }
  html += '</div></div>';

  // ── SECTION 5 : FRAIS DE NOTAIRE ──
  html += '<div class="rapport-section">';
  html += '<div class="rs-head"><span class="rs-icon">📝</span><span class="rs-title">Frais de notaire</span><span class="rs-badge">Calcul Hanaé</span></div>';
  html += '<div class="rs-body">';
  html += '<div class="fn-box">';
  html += '<div class="fn-title">Estimation frais de notaire — ' + c.typeNotaire + ' (' + c.tauxNotaire + '%)</div>';
  html += '<div class="fn-row"><span class="fn-lbl">Prix de vente</span><span class="fn-val">' + fmt(a.prix) + ' €</span></div>';

  html += '<div class="fn-row"><span class="fn-lbl">Émoluments du notaire</span><span class="fn-val">' + fmt(c.emolumentNotaire) + ' €</span></div>';
  html += '<div class="fn-row"><span class="fn-lbl">Débours et frais divers</span><span class="fn-val">' + fmt(c.debours) + ' €</span></div>';
  html += '<div class="fn-row"><span class="fn-lbl">Total frais de notaire</span><span class="fn-val">' + fmt(c.fraisNotaire) + ' €</span></div>';
  html += '<div class="fn-row" style="margin-top:4px;padding-top:8px;border-top:2px solid rgba(192,155,90,.4)"><span class="fn-lbl" style="font-weight:600;color:#633806">Prix total acquéreur</span><span class="fn-val" style="font-size:16px">' + fmt(c.prixTotal) + ' €</span></div>';
  html += '</div>';
  html += '<div class="disclaimer">Les frais de notaire sont estimés selon les barèmes en vigueur. Taux appliqué : ' + c.tauxNotaire + '% (' + c.typeNotaire + '). Ces montants sont indicatifs et peuvent varier selon la localisation et les conditions de la vente.</div>';
  html += '</div></div>';

  // ── SECTION 6 : INSEE ──
  if (insee && insee.nom) {
    html += '<div class="rapport-section">';
    html += '<div class="rs-head"><span class="rs-icon">🏙</span><span class="rs-title">Données de la commune — ' + insee.nom + '</span><span class="rs-badge">INSEE</span></div>';
    html += '<div class="rs-body">';
    html += '<div class="insee-grid">';
    html += '<div class="insee-block"><div class="insee-title">Commune</div>';
    html += '<div class="insee-row"><span class="insee-lbl">Nom</span><span class="insee-val">' + insee.nom + '</span></div>';
    html += '<div class="insee-row"><span class="insee-lbl">Code INSEE</span><span class="insee-val">' + (insee.code||'—') + '</span></div>';
    html += '<div class="insee-row"><span class="insee-lbl">Code postal</span><span class="insee-val">' + (a.code_postal||'—') + '</span></div>';
    html += '<div class="insee-row"><span class="insee-lbl">Population</span><span class="insee-val">' + (insee.population ? insee.population.toLocaleString('fr-FR') + ' hab.' : '—') + '</span></div>';
    html += '</div>';
    html += '<div class="insee-block"><div class="insee-title">Marché local DVF</div>';

    html += '<div class="insee-row"><span class="insee-lbl">Source</span><span class="insee-val">DVF DGFiP</span></div>';
    html += '</div></div>';
    html += '</div></div>';
  }

  // ── SECTION 7 : SYNTHÈSE HANAÉ ──

  html += '<div class="disclaimer" style="margin-top:12px">Cet avis de valeur est généré automatiquement par intelligence artificielle sur la base des données DVF (Demandes de Valeurs Foncières) de la DGFiP et des informations renseignées par le vendeur. Il ne constitue pas une expertise immobilière et ne saurait engager la responsabilité d\'ImmoConnect. Les données de marché sont issues des ventes passées enregistrées dans la base DVF officielle.</div>';
  html += '</div></div>';

  document.getElementById('rapport-content').innerHTML = html;
}

/* ══ GÉNÉRATION PDF ══ */
async function genererPDF() {
  if (!rapportData) return;
  var btn = document.getElementById('btn-pdf');
  btn.disabled = true;
  btn.textContent = '⏳ Génération…';

  var { jsPDF } = window.jspdf;
  var doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
  var a = rapportData.annonce, c = rapportData.calculs, dvf = rapportData.dvf;
  var fmt = function(n) { return n ? Math.round(n).toLocaleString('fr-FR') : '—'; };

  var y = 15;
  var lm = 15; // left margin
  var pw = 180; // page width

  var addPage = function() { doc.addPage(); y = 15; };
  var checkY = function(h) { if (y + h > 280) { addPage(); } };

  // ── PAGE 1 : ENTÊTE ──
  doc.setFillColor(15,15,14);
  doc.rect(0,0,210,28,'F');
  doc.setTextColor(255,255,255);
  doc.setFontSize(18); doc.setFont('helvetica','bold');
  doc.text('ImmoConnect', lm, 12);
  doc.setFontSize(11); doc.setFont('helvetica','normal');
  doc.setTextColor(192,155,90);
  doc.text('Rapport Hanaé — Évaluation immobilière IA', lm, 20);
  doc.setTextColor(200,200,200);
  doc.text('Généré le ' + new Date().toLocaleDateString('fr-FR'), 150, 20);

  y = 38;

  // Titre
  doc.setTextColor(15,15,14);
  doc.setFontSize(16); doc.setFont('helvetica','bold');
  doc.text(a.type_bien + ' — ' + (a.surface||'—') + ' m² — ' + a.ville, lm, y);
  y += 7;
  doc.setFontSize(11); doc.setFont('helvetica','normal');
  doc.setTextColor(136,135,128);
  doc.text((a.adresse ? a.adresse + ', ' : '') + a.code_postal + ' ' + a.ville, lm, y);
  y += 12;

  // Stats bien
  doc.setFillColor(245,242,236);
  doc.roundedRect(lm,y,pw,24,2,2,'F');
  var stats = [
    {l:'Surface', v:(a.surface||'—')+' m²'},
    {l:'Pièces', v:(a.nb_pieces||'—')},
    {l:'Prix demandé', v:fmt(a.prix)+' €'},
    {l:'Prix/m²', v:fmt(c.prixM2)+' €/m²'},
    {l:'Année constr.', v:(a.annee_construction||'—')},
  ];
  stats.forEach(function(s,i) {
    var x = lm + 5 + i * 36;
    doc.setFontSize(8); doc.setTextColor(136,135,128); doc.setFont('helvetica','normal');
    doc.text(s.l, x, y+7);
    doc.setFontSize(11); doc.setTextColor(15,15,14); doc.setFont('helvetica','bold');
    doc.text(s.v, x, y+15);
  });
  y += 32;

  // Description
  if (a.description) {
    doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.setTextColor(136,135,128);
    var lines = doc.splitTextToSize(a.description, pw);
    doc.text(lines.slice(0,3), lm, y);
    y += lines.slice(0,3).length * 5 + 8;
  }

  // ── SECTION PRIX MARCHÉ ──
  checkY(50);
  doc.setFillColor(30,122,98);
  doc.rect(lm,y,pw,6,'F');
  doc.setTextColor(255,255,255); doc.setFontSize(10); doc.setFont('helvetica','bold');
  doc.text('ANALYSE DE MARCHÉ — DONNÉES DVF OFFICIELLES', lm+3, y+4);
  y += 10;

  doc.setFillColor(245,242,236);
  doc.roundedRect(lm,y,55,22,2,2,'F');
  doc.setTextColor(136,135,128); doc.setFontSize(8); doc.setFont('helvetica','normal');
  doc.text('Prix demandé', lm+3, y+6);
  doc.setTextColor(15,15,14); doc.setFontSize(13); doc.setFont('helvetica','bold');
  doc.text(fmt(a.prix)+' €', lm+3, y+14);
  doc.setFontSize(9); doc.setTextColor(136,135,128);
  doc.text(fmt(c.prixM2)+' €/m²', lm+3, y+20);

  doc.setFillColor(225,245,238);
  doc.roundedRect(lm+62,y,55,22,2,2,'F');
  doc.setTextColor(136,135,128); doc.setFontSize(8); doc.setFont('helvetica','normal');
  doc.text('Prix marché DVF', lm+65, y+6);
  doc.setTextColor(30,122,98); doc.setFontSize(13); doc.setFont('helvetica','bold');
  doc.text(fmt(c.prixM2Marche)+' €/m²', lm+65, y+14);
  doc.setFontSize(9); doc.setTextColor(30,122,98);
  doc.text(dvf.nbVentes+' ventes analysées', lm+65, y+20);

  doc.setFillColor(250,238,218);
  doc.roundedRect(lm+124,y,55,22,2,2,'F');
  doc.setTextColor(136,135,128); doc.setFontSize(8); doc.setFont('helvetica','normal');
  doc.text('Fourchette estimée', lm+127, y+6);
  doc.setTextColor(133,79,11); doc.setFontSize(10); doc.setFont('helvetica','bold');
  doc.text(fmt(c.fourchetteBas)+'€', lm+127, y+13);
  doc.text('à '+fmt(c.fourchettHaut)+'€', lm+127, y+20);
  y += 28;

  // ── HISTORIQUE DVF ──
  if (dvf.historique && dvf.historique.length > 0) {
    checkY(40);
    doc.setFontSize(10); doc.setFont('helvetica','bold'); doc.setTextColor(15,15,14);
    doc.text('Historique des ventes similaires (DVF)', lm, y);
    y += 6;

    doc.setFillColor(245,242,236);
    doc.rect(lm,y,pw,6,'F');
    doc.setFontSize(8); doc.setFont('helvetica','bold'); doc.setTextColor(136,135,128);
    doc.text('Année', lm+3, y+4);
    doc.text('Nb ventes', lm+35, y+4);
    doc.text('Prix moyen /m²', lm+75, y+4);
    doc.text('Estimation ('+a.surface+' m²)', lm+125, y+4);
    y += 8;

    dvf.historique.forEach(function(h) {
      checkY(8);
      doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(15,15,14);
      doc.text(h.annee, lm+3, y);
      doc.text(h.nb+' ventes', lm+35, y);
      doc.setTextColor(30,122,98); doc.setFont('helvetica','bold');
      doc.text(fmt(h.prixM2)+' €/m²', lm+75, y);
      doc.setTextColor(15,15,14); doc.setFont('helvetica','normal');
      doc.text(fmt(h.prixM2*(parseFloat(a.surface)||50))+' €', lm+125, y);
      doc.setDrawColor(232,230,224);
      doc.line(lm, y+2, lm+pw, y+2);
      y += 7;
    });
    y += 4;
  }

  // ── RENDEMENT ──
  if (parseFloat(c.loyerAnnuel) > 0) {
    checkY(40);
    doc.setFillColor(30,122,98);
    doc.rect(lm,y,pw,6,'F');
    doc.setTextColor(255,255,255); doc.setFontSize(10); doc.setFont('helvetica','bold');
    doc.text('RENDEMENT LOCATIF', lm+3, y+4);
    y += 10;

    doc.setFillColor(245,242,236);
    doc.roundedRect(lm,y,85,30,2,2,'F');
    doc.setTextColor(136,135,128); doc.setFontSize(8); doc.setFont('helvetica','normal');
    doc.text('Rendement brut', lm+3, y+7);
    doc.setTextColor(30,122,98); doc.setFontSize(20); doc.setFont('helvetica','bold');
    doc.text(c.rendementBrut+' %', lm+3, y+18);
    doc.setFontSize(8); doc.setFont('helvetica','normal'); doc.setTextColor(136,135,128);
    doc.text('Loyer annuel: '+fmt(c.loyerAnnuel)+' €', lm+3, y+25);

    doc.setFillColor(245,242,236);
    doc.roundedRect(lm+92,y,85,30,2,2,'F');
    doc.setTextColor(136,135,128); doc.setFontSize(8); doc.setFont('helvetica','normal');
    doc.text('Rendement net', lm+95, y+7);
    doc.setTextColor(30,122,98); doc.setFontSize(20); doc.setFont('helvetica','bold');
    doc.text(c.rendementNet+' %', lm+95, y+18);
    doc.setFontSize(8); doc.setFont('helvetica','normal'); doc.setTextColor(136,135,128);
    doc.text('Après charges: '+fmt(c.chargesAnnuelles)+' €/an', lm+95, y+25);
    y += 36;
  }

  // ── FRAIS DE NOTAIRE ──
  checkY(55);
  doc.setFillColor(192,155,90);
  doc.rect(lm,y,pw,6,'F');
  doc.setTextColor(255,255,255); doc.setFontSize(10); doc.setFont('helvetica','bold');
  doc.text('FRAIS DE NOTAIRE — ' + c.typeNotaire.toUpperCase() + ' (' + c.tauxNotaire + '%)', lm+3, y+4);
  y += 10;

  var fnItems = [
    ['Prix de vente', fmt(a.prix)+' €'],
    ['Droits de mutation (taxes)', fmt(c.droitsMutation)+' €'],
    ['Émoluments du notaire', fmt(c.emolumentNotaire)+' €'],
    ['Débours et frais divers', fmt(c.debours)+' €'],
    ['Total frais de notaire', fmt(c.fraisNotaire)+' €'],
    ['PRIX TOTAL ACQUÉREUR', fmt(c.prixTotal)+' €'],
  ];
  fnItems.forEach(function(row,i) {
    checkY(8);
    var isTot = i === fnItems.length-1;
    if (isTot) { doc.setFillColor(250,238,218); doc.rect(lm,y-4,pw,8,'F'); }
    doc.setFontSize(isTot?10:9); doc.setFont('helvetica', isTot?'bold':'normal');
    doc.setTextColor(isTot?99:15, isTot?59:15, isTot?11:14);
    doc.text(row[0], lm+3, y);
    doc.text(row[1], lm+pw-5, y, {align:'right'});
    if (!isTot) { doc.setDrawColor(232,230,224); doc.line(lm,y+2,lm+pw,y+2); }
    y += 8;
  });
  y += 6;

  // ── SYNTHÈSE HANAÉ ──
  checkY(60);
  addPage();
  doc.setFillColor(15,15,14);
  doc.rect(lm,y,pw,8,'F');
  doc.setTextColor(158,225,203); doc.setFontSize(10); doc.setFont('helvetica','bold');
  doc.text('SYNTHÈSE HANAÉ — AVIS DE VALEUR IA', lm+3, y+5.5);
  y += 14;

  doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.setTextColor(15,15,14);
  var syntheseTxt = (rapportData.synthese || '').replace(/^#{1,6}\s*/gm,'').replace(/\*\*/g,'').replace(/\*/g,'').replace(/^-{3,}\s*$/gm,'');
  var synLines = doc.splitTextToSize(syntheseTxt, pw-6);
  doc.text(synLines, lm+3, y);
  y += synLines.length * 5 + 10;

  // Disclaimer
  doc.setFillColor(245,242,236);
  doc.roundedRect(lm,y,pw,20,2,2,'F');
  doc.setFontSize(7.5); doc.setFont('helvetica','italic'); doc.setTextColor(136,135,128);
  var disc = 'Cet avis de valeur est généré automatiquement par IA sur la base des données DVF (DGFiP). Il ne constitue pas une expertise immobilière. Données basées sur les ventes passées.';
  doc.text(doc.splitTextToSize(disc, pw-6), lm+3, y+6);
  y += 26;

  // ── FOOTER ──
  var pageCount = doc.internal.getNumberOfPages();
  for (var i=1; i<=pageCount; i++) {
    doc.setPage(i);
    doc.setFillColor(245,242,236);
    doc.rect(0,287,210,10,'F');
    doc.setFontSize(8); doc.setFont('helvetica','normal'); doc.setTextColor(136,135,128);
    doc.text('Hanaé — Agent IA ImmoConnect · Données DVF DGFiP · '+new Date().toLocaleDateString('fr-FR'), 15, 293);
    doc.text('Page '+i+'/'+pageCount, 195, 293, {align:'right'});
  }

  var nomFichier = 'rapport-hanae-' + (a.ville||'').toLowerCase().replace(/\s/g,'-') + '-' + new Date().toISOString().slice(0,10) + '.pdf';
  doc.save(nomFichier);

  btn.disabled = false;
  btn.textContent = '⬇ Télécharger PDF';
}
</script>

    b.style.cssText = 'position:fixed;bottom:0;left:0;right:0;z-index:9999;background:#1C1C1A;border-top:1px solid rgba(255,255,255,.1);padding:16px 32px;font-family:Outfit,sans-serif';
    b.innerHTML = '<div style="max-width:1080px;margin:0 auto;display:flex;align-items:center;gap:24px;flex-wrap:wrap"><div style="flex:1;min-width:280px"><div style="font-size:14px;font-weight:500;color:#FAFAF7;margin-bottom:4px">🍪 Cookies & confidentialité</div><div style="font-size:12px;color:rgba(250,250,247,.6);line-height:1.6">ImmoConnect utilise des cookies strictement nécessaires. Aucun cookie publicitaire. <a href=\"mentions-legales.html\" style=\"color:#C09B5A\">En savoir plus</a></div></div><div style="display:flex;gap:10px;flex-shrink:0"><button onclick=\"icRefuser()\" style=\"padding:9px 20px;border-radius:8px;border:1px solid rgba(255,255,255,.2);background:transparent;color:rgba(250,250,247,.7);font-family:Outfit,sans-serif;font-size:13px;cursor:pointer\">Refuser</button><button onclick=\"icAccepter()\" style=\"padding:9px 20px;border-radius:8px;border:none;background:#C09B5A;color:#1C1C1A;font-family:Outfit,sans-serif;font-size:13px;font-weight:500;cursor:pointer\">Accepter</button></div></div>';
    document.body.appendChild(b);
  }
})();
function icAccepter() { localStorage.setItem('ic_cookie_consent','accepted'); document.getElementById('cookie-banner').style.display='none'; }
function icRefuser() { localStorage.setItem('ic_cookie_consent','refused'); document.getElementById('cookie-banner').style.display='none'; }
</script>
<script>
(function(){
  var aid = new URLSearchParams(location.search).get('annonce');
  if (!aid) return;
  var go = function(){
    var inp = document.getElementById('annonce-id');
    if (inp) inp.value = aid;
    var sb = document.querySelector('.search-box');

    if (typeof chargerRapport === 'function') chargerRapport();
  };
  if (document.readyState !== 'loading') go();
  else document.addEventListener('DOMContentLoaded', go);
})();
