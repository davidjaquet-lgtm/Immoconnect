<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ImmoConnect — Carte DVF</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --cream: #F4EFE6;
  --warm: #FAFAF7;
  --charcoal: #1C1C1A;
  --stone: #8A8478;
  --gold: #B89A5E;
  --gold-l: #D4B87A;
  --terra: #C4785A;
  --sage: #5A8A72;
  --blue: #3A6EA5;
  --border: rgba(28,28,26,0.1);
  --panel: 380px;
  --nav: 56px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:var(--warm); color:var(--charcoal); height:100vh; display:flex; flex-direction:column; overflow:hidden; }

/* NAV */
nav {
  height:var(--nav); min-height:var(--nav);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 24px;
  background:rgba(250,250,247,0.97); backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border); z-index:1000; flex-shrink:0;
}
.logo { font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:600; letter-spacing:-0.3px; }
.logo span { color:var(--gold); }
.nav-center { display:flex; align-items:center; gap:6px; }
.nav-tab {
  padding:7px 18px; border:1px solid var(--border); border-radius:2px;
  background:transparent; font-family:'DM Sans',sans-serif; font-size:13px;
  cursor:pointer; color:var(--stone); transition:all .2s; font-weight:400;
}
.nav-tab.active { background:var(--charcoal); color:var(--warm); border-color:var(--charcoal); }
.nav-tab:hover:not(.active) { border-color:var(--gold); color:var(--gold); }
.nav-right { display:flex; align-items:center; gap:12px; font-size:13px; color:var(--stone); }
.dvf-badge {
  display:flex; align-items:center; gap:6px;
  padding:5px 12px; background:rgba(90,138,114,0.12);
  border:1px solid rgba(90,138,114,0.3); border-radius:20px;
  font-size:11px; color:var(--sage); font-weight:500; letter-spacing:0.3px;
}
.dvf-dot { width:7px; height:7px; border-radius:50%; background:var(--sage); animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* LAYOUT */
.app { display:flex; flex:1; overflow:hidden; }

/* PANEL */
.panel {
  width:var(--panel); min-width:var(--panel);
  background:var(--warm); border-right:1px solid var(--border);
  display:flex; flex-direction:column; overflow:hidden; z-index:100;
}

/* SEARCH BAR */
.search-wrap { padding:16px; border-bottom:1px solid var(--border); }
.search-input-wrap {
  position:relative; display:flex; align-items:center;
}
.search-icon { position:absolute; left:12px; color:var(--stone); font-size:16px; pointer-events:none; }
.search-input {
  width:100%; padding:10px 12px 10px 36px;
  border:1px solid var(--border); border-radius:2px;
  font-family:'DM Sans',sans-serif; font-size:14px; outline:none;
  background:var(--warm); color:var(--charcoal); transition:border-color .2s;
}
.search-input:focus { border-color:var(--gold); }
.search-btn {
  margin-left:8px; padding:10px 16px; background:var(--charcoal); color:var(--warm);
  border:none; border-radius:2px; font-family:'DM Sans',sans-serif;
  font-size:13px; cursor:pointer; white-space:nowrap; transition:background .2s;
}
.search-btn:hover { background:var(--gold); color:var(--charcoal); }

/* FILTERS */
.filters { padding:12px 16px; border-bottom:1px solid var(--border); }
.filters-title { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--stone); margin-bottom:10px; font-weight:500; }
.filter-row { display:flex; gap:8px; margin-bottom:8px; flex-wrap:wrap; }
.filter-select {
  flex:1; min-width:100px; padding:8px 10px; border:1px solid var(--border); border-radius:2px;
  font-family:'DM Sans',sans-serif; font-size:12px; color:var(--charcoal);
  background:var(--warm); cursor:pointer; outline:none; transition:border-color .2s;
}
.filter-select:focus { border-color:var(--gold); }
.filter-range { display:flex; flex-direction:column; gap:4px; }
.filter-range label { font-size:10px; color:var(--stone); letter-spacing:1px; text-transform:uppercase; }
.range-inputs { display:flex; gap:6px; align-items:center; }
.range-inputs input {
  flex:1; padding:7px 8px; border:1px solid var(--border); border-radius:2px;
  font-family:'DM Sans',sans-serif; font-size:12px; color:var(--charcoal);
  background:var(--warm); outline:none; width:0;
}
.range-sep { font-size:12px; color:var(--stone); flex-shrink:0; }
.btn-apply {
  width:100%; margin-top:10px; padding:9px; background:var(--gold); color:var(--charcoal);
  border:none; border-radius:2px; font-family:'DM Sans',sans-serif;
  font-size:13px; font-weight:500; cursor:pointer; transition:background .2s; letter-spacing:0.3px;
}
.btn-apply:hover { background:var(--gold-l); }

/* RESULTS */
.results-header {
  padding:12px 16px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
.results-count { font-size:12px; color:var(--stone); }
.results-count strong { color:var(--charcoal); font-weight:600; }
.sort-select {
  padding:5px 8px; border:1px solid var(--border); border-radius:2px;
  font-family:'DM Sans',sans-serif; font-size:11px; color:var(--stone);
  background:var(--warm); cursor:pointer; outline:none;
}

.results-list { flex:1; overflow-y:auto; padding:8px; }
.results-list::-webkit-scrollbar { width:4px; }
.results-list::-webkit-scrollbar-track { background:transparent; }
.results-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

/* TRANSACTION CARD */
.txn-card {
  padding:14px 16px; margin-bottom:6px;
  border:1px solid var(--border); border-radius:2px;
  cursor:pointer; transition:all .2s; background:var(--warm);
  position:relative; overflow:hidden;
}
.txn-card::before {
  content:''; position:absolute; left:0; top:0; bottom:0;
  width:3px; background:transparent; transition:background .2s;
}
.txn-card:hover { border-color:rgba(184,154,94,0.4); box-shadow:0 2px 16px rgba(28,28,26,0.06); }
.txn-card:hover::before { background:var(--gold); }
.txn-card.selected { border-color:var(--gold); background:rgba(184,154,94,0.04); }
.txn-card.selected::before { background:var(--gold); }
.txn-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:6px; }
.txn-price { font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:300; line-height:1; }
.txn-badge {
  padding:3px 8px; border-radius:1px; font-size:9px; font-weight:600;
  letter-spacing:1.5px; text-transform:uppercase; flex-shrink:0;
}
.badge-apt { background:rgba(58,110,165,0.12); color:var(--blue); }
.badge-mai { background:rgba(196,120,90,0.15); color:var(--terra); }
.badge-ter { background:rgba(90,138,114,0.15); color:var(--sage); }
.badge-dep { background:rgba(138,132,120,0.15); color:var(--stone); }
.txn-addr { font-size:13px; color:var(--charcoal); font-weight:500; margin-bottom:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.txn-meta { display:flex; gap:12px; font-size:11px; color:var(--stone); }
.txn-meta span { display:flex; align-items:center; gap:3px; }
.txn-ppm2 { margin-top:6px; padding-top:6px; border-top:1px solid var(--border); font-size:11px; color:var(--stone); display:flex; justify-content:space-between; }
.txn-ppm2 strong { color:var(--charcoal); }

/* LOADING */
.loading {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:48px 16px; gap:12px; color:var(--stone); font-size:13px;
}
.spinner {
  width:32px; height:32px; border:2px solid var(--border);
  border-top-color:var(--gold); border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.empty { text-align:center; padding:40px 16px; color:var(--stone); }
.empty-icon { font-size:36px; margin-bottom:12px; }
.empty p { font-size:13px; line-height:1.6; }

/* MAP */
#map { flex:1; z-index:1; }

/* POPUP */
.lf-popup { font-family:'DM Sans',sans-serif; }
.popup-price { font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:300; margin-bottom:6px; color:var(--charcoal); }
.popup-addr { font-size:13px; color:var(--charcoal); font-weight:500; margin-bottom:4px; }
.popup-meta { font-size:12px; color:var(--stone); display:flex; flex-direction:column; gap:3px; }
.popup-tag {
  display:inline-block; padding:2px 8px; border-radius:1px;
  font-size:9px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase;
  margin-bottom:6px;
}

/* MARKER */
.price-marker {
  background:var(--charcoal); color:var(--warm); border:none; border-radius:3px;
  font-family:'DM Sans',sans-serif; font-size:11px; font-weight:600;
  padding:4px 8px; white-space:nowrap; letter-spacing:-0.3px;
  box-shadow:0 2px 8px rgba(28,28,26,0.25);
  transition:all .2s; cursor:pointer;
  position:relative;
}
.price-marker::after {
  content:''; position:absolute; left:50%; bottom:-5px; transform:translateX(-50%);
  border-left:5px solid transparent; border-right:5px solid transparent;
  border-top:5px solid var(--charcoal);
}
.price-marker.apt { background:var(--blue); }
.price-marker.apt::after { border-top-color:var(--blue); }
.price-marker.mai { background:var(--terra); }
.price-marker.mai::after { border-top-color:var(--terra); }
.price-marker.ter { background:var(--sage); }
.price-marker.ter::after { border-top-color:var(--sage); }
.price-marker.selected { transform:scale(1.15); z-index:500!important; }

/* MAP CONTROLS */
.map-overlay {
  position:absolute; top:16px; right:16px; z-index:500;
  display:flex; flex-direction:column; gap:8px;
}
.map-stat-box {
  background:rgba(250,250,247,0.95); backdrop-filter:blur(8px);
  border:1px solid var(--border); border-radius:2px; padding:12px 16px;
  min-width:160px;
}
.stat-box-title { font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--stone); margin-bottom:4px; }
.stat-box-val { font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:300; color:var(--charcoal); }
.stat-box-sub { font-size:10px; color:var(--stone); margin-top:2px; }

/* LEGEND */
.legend {
  position:absolute; bottom:32px; right:16px; z-index:500;
  background:rgba(250,250,247,0.95); backdrop-filter:blur(8px);
  border:1px solid var(--border); border-radius:2px; padding:12px 14px;
}
.legend-title { font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--stone); margin-bottom:8px; }
.legend-item { display:flex; align-items:center; gap:8px; margin-bottom:5px; font-size:11px; color:var(--charcoal); }
.legend-dot { width:10px; height:10px; border-radius:1px; flex-shrink:0; }

/* SOURCE NOTE */
.source-note {
  position:absolute; bottom:32px; left:16px; z-index:500;
  background:rgba(250,250,247,0.9); backdrop-filter:blur(8px);
  border:1px solid var(--border); border-radius:2px; padding:6px 10px;
  font-size:10px; color:var(--stone);
}
.source-note a { color:var(--gold); text-decoration:none; }

/* HEATMAP TOGGLE */
.view-toggle {
  position:absolute; top:16px; left:16px; z-index:500;
  display:flex; gap:4px;
}
.view-btn {
  padding:7px 14px; background:rgba(250,250,247,0.95); backdrop-filter:blur(8px);
  border:1px solid var(--border); border-radius:2px;
  font-family:'DM Sans',sans-serif; font-size:11px; font-weight:500;
  cursor:pointer; color:var(--stone); transition:all .2s;
}
.view-btn.active { background:var(--charcoal); color:var(--warm); border-color:var(--charcoal); }
.view-btn:hover:not(.active) { border-color:var(--gold); color:var(--gold); }

.map-container { flex:1; position:relative; }

/* DETAIL PANEL */
.detail-overlay {
  position:absolute; bottom:0; left:0; right:0; z-index:600;
  background:rgba(250,250,247,0.98); backdrop-filter:blur(8px);
  border-top:1px solid var(--border); padding:20px 24px;
  transform:translateY(100%); transition:transform .3s ease;
}
.detail-overlay.open { transform:translateY(0); }
.detail-close {
  position:absolute; top:16px; right:16px;
  width:30px; height:30px; border:1px solid var(--border); border-radius:50%;
  background:transparent; cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center;
}
.detail-close:hover { border-color:var(--charcoal); }
.detail-grid { display:flex; gap:24px; flex-wrap:wrap; }
.detail-main { flex:1; min-width:200px; }
.detail-price { font-family:'Cormorant Garamond',serif; font-size:32px; font-weight:300; margin-bottom:4px; }
.detail-addr { font-size:15px; font-weight:500; margin-bottom:4px; }
.detail-date { font-size:12px; color:var(--stone); }
.detail-stats { display:flex; gap:20px; margin-top:16px; flex-wrap:wrap; }
.dstat { }
.dstat-val { font-size:18px; font-weight:600; color:var(--charcoal); }
.dstat-lbl { font-size:10px; color:var(--stone); letter-spacing:1px; text-transform:uppercase; margin-top:2px; }

@media (max-width:768px) {
  .panel { position:absolute; left:-100%; width:90%; max-width:360px; z-index:200; height:100%; transition:left .3s; }
  .panel.open { left:0; }
  .map-container { width:100%; }
}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="logo">Immo<span>Connect</span> <span style="font-family:'DM Sans';font-size:13px;color:var(--stone);font-weight:300;margin-left:4px">/ Carte DVF</span></div>
  <div class="nav-center">
    <button class="nav-tab active" onclick="setMode('transactions',this)">Transactions</button>
    <button class="nav-tab" onclick="setMode('prix',this)">Prix au m²</button>
    <button class="nav-tab" onclick="setMode('volume',this)">Volume</button>
  </div>
  <div class="nav-right">
    <div class="dvf-badge"><div class="dvf-dot"></div>Source DVF · DGFiP</div>
    <a href="immo-connect.html" style="font-size:12px;color:var(--stone);text-decoration:none;padding:6px 14px;border:1px solid var(--border);border-radius:2px;">← Accueil</a>
  </div>
</nav>

<!-- APP -->
<div class="app">

  <!-- PANEL -->
  <div class="panel" id="panel">
    <!-- SEARCH -->
    <div class="search-wrap">
      <div class="search-input-wrap">
        <span class="search-icon">⌕</span>
        <input type="text" class="search-input" id="searchInput"
          placeholder="Ville, code postal, adresse…" value="Paris"
          onkeydown="if(event.key==='Enter')doSearch()">
        <button class="search-btn" onclick="doSearch()">OK</button>
      </div>
    </div>

    <!-- FILTERS -->
    <div class="filters">
      <div class="filters-title">Filtres DVF</div>
      <div class="filter-row">
        <select class="filter-select" id="fType">
          <option value="">Tous les types</option>
          <option value="Appartement">Appartement</option>
          <option value="Maison">Maison</option>
          <option value="Terrain">Terrain</option>
          <option value="Dépendance">Dépendance</option>
        </select>
        <select class="filter-select" id="fYear">
          <option value="">Toutes années</option>
          <option value="2024">2024</option>
          <option value="2023">2023</option>
          <option value="2022">2022</option>
          <option value="2021">2021</option>
          <option value="2020">2020</option>
        </select>
      </div>
      <div class="filter-range">
        <label>Prix (€)</label>
        <div class="range-inputs">
          <input type="number" id="fPrixMin" placeholder="Min" step="10000">
          <span class="range-sep">—</span>
          <input type="number" id="fPrixMax" placeholder="Max" step="10000">
        </div>
      </div>
      <div class="filter-range" style="margin-top:8px">
        <label>Surface (m²)</label>
        <div class="range-inputs">
          <input type="number" id="fSurfMin" placeholder="Min">
          <span class="range-sep">—</span>
          <input type="number" id="fSurfMax" placeholder="Max">
        </div>
      </div>
      <button class="btn-apply" onclick="applyFilters()">Appliquer les filtres</button>
    </div>

    <!-- RESULTS -->
    <div class="results-header">
      <div class="results-count" id="resultsCount"><strong>—</strong> transactions</div>
      <select class="sort-select" id="sortSelect" onchange="sortResults()">
        <option value="date">Plus récent</option>
        <option value="prix_desc">Prix ↓</option>
        <option value="prix_asc">Prix ↑</option>
        <option value="m2_desc">€/m² ↓</option>
      </select>
    </div>
    <div class="results-list" id="resultsList">
      <div class="loading"><div class="spinner"></div>Chargement des données DVF…</div>
    </div>
  </div>

  <!-- MAP -->
  <div class="map-container">
    <div id="map"></div>

    <!-- View toggle -->
    <div class="view-toggle">
      <button class="view-btn active" id="btnMarkers" onclick="setView('markers',this)">📍 Markers</button>
      <button class="view-btn" id="btnCluster" onclick="setView('cluster',this)">🔵 Cluster</button>
    </div>

    <!-- Stats overlay -->
    <div class="map-overlay">
      <div class="map-stat-box">
        <div class="stat-box-title">Prix médian</div>
        <div class="stat-box-val" id="statMedian">—</div>
        <div class="stat-box-sub" id="statMedianSub">€/m² sur la zone</div>
      </div>
      <div class="map-stat-box">
        <div class="stat-box-title">Transactions</div>
        <div class="stat-box-val" id="statCount">—</div>
        <div class="stat-box-sub" id="statPeriod">chargement…</div>
      </div>
    </div>

    <!-- Legend -->
    <div class="legend">
      <div class="legend-title">Type de bien</div>
      <div class="legend-item"><div class="legend-dot" style="background:#3A6EA5"></div>Appartement</div>
      <div class="legend-item"><div class="legend-dot" style="background:#C4785A"></div>Maison</div>
      <div class="legend-item"><div class="legend-dot" style="background:#5A8A72"></div>Terrain</div>
      <div class="legend-item"><div class="legend-dot" style="background:#8A8478"></div>Autre</div>
    </div>

    <!-- Source note -->
    <div class="source-note">
      Données : <a href="https://www.data.gouv.fr/fr/datasets/demandes-de-valeurs-foncieres-geolocalisees/" target="_blank">DVF géolocalisées</a> — DGFiP / data.gouv.fr
    </div>

    <!-- Detail panel -->
    <div class="detail-overlay" id="detailOverlay">
      <button class="detail-close" onclick="closeDetail()">✕</button>
      <div id="detailContent"></div>
    </div>
  </div>
</div>

<script>
// ── MAP INIT ──
const map = L.map('map', { zoomControl:false }).setView([48.8566, 2.3522], 13);
L.control.zoom({ position:'bottomright' }).addTo(map);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution:'©OpenStreetMap ©CartoDB', maxZoom:19
}).addTo(map);

// ── STATE ──
let allData = [];
let filtered = [];
let markers = [];
let markerLayer = L.layerGroup().addTo(map);
let selectedId = null;
let currentMode = 'transactions';
let currentView = 'markers';

// ── TYPE HELPERS ──
function typeClass(t) {
  if (!t) return 'dep';
  const s = t.toLowerCase();
  if (s.includes('appart')) return 'apt';
  if (s.includes('maison')) return 'mai';
  if (s.includes('terrain')) return 'ter';
  return 'dep';
}
function typeLabel(t) {
  if (!t) return 'Autre';
  const s = t.toLowerCase();
  if (s.includes('appart')) return 'APT';
  if (s.includes('maison')) return 'MAI';
  if (s.includes('terrain')) return 'TER';
  return 'DEP';
}
function badgeClass(t) {
  if (!t) return 'badge-dep';
  const s = t.toLowerCase();
  if (s.includes('appart')) return 'badge-apt';
  if (s.includes('maison')) return 'badge-mai';
  if (s.includes('terrain')) return 'badge-ter';
  return 'badge-dep';
}
function fmtPrice(v) {
  if (!v) return '—';
  return new Intl.NumberFormat('fr-FR', { style:'currency', currency:'EUR', maximumFractionDigits:0 }).format(v);
}
function fmtDate(d) {
  if (!d) return '—';
  try { return new Date(d).toLocaleDateString('fr-FR', { year:'numeric', month:'long', day:'numeric' }); }
  catch(e) { return d; }
}
function fmtAddr(item) {
  const parts = [item.adresse_numero, item.adresse_nom_voie, item.code_postal, item.nom_commune]
    .filter(Boolean).join(' ');
  return parts || item.nom_commune || '—';
}
function ppm2(item) {
  const v = item.valeur_fonciere;
  const s = item.surface_reelle_bati || item.surface_terrain;
  if (v && s && s > 0) return Math.round(v / s);
  return null;
}

// ── GEOCODE ──
async function geocode(q) {
  const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&countrycodes=fr&limit=1`);
  const d = await r.json();
  if (d.length) return { lat:parseFloat(d[0].lat), lon:parseFloat(d[0].lon), name:d[0].display_name };
  return null;
}

// ── FETCH DVF (public API by Christian Quest / cerema) ──
async function fetchDVF(lat, lon) {
  showLoading();
  allData = [];
  
  // Primary: cerema DVF+ open-data API (public, no auth)
  const url = `https://apidf-preprod.cerema.fr/dvf_opendata/mutations/?in_bbox=${(lon-0.05).toFixed(4)},${(lat-0.03).toFixed(4)},${(lon+0.05).toFixed(4)},${(lat+0.03).toFixed(4)}&ordering=-date_mutation&page_size=200`;
  
  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error('cerema ' + r.status);
    const d = await r.json();
    const results = d.features || d.results || [];
    
    if (results.length === 0) {
      // fallback: try the cquest micro-API
      await fetchDVFMicro(lat, lon);
      return;
    }
    
    // Cerema GeoJSON format
    if (d.features) {
      allData = d.features.map((f,i) => ({
        _id: i,
        lat: f.geometry?.coordinates?.[1],
        lon: f.geometry?.coordinates?.[0],
        ...f.properties
      })).filter(x => x.lat && x.lon);
    } else {
      allData = results.map((item,i) => ({
        _id: i,
        lat: item.latitude || (item.geom?.coordinates?.[1]),
        lon: item.longitude || (item.geom?.coordinates?.[0]),
        ...item
      })).filter(x => x.lat && x.lon);
    }
    
    processData();
  } catch(e) {
    console.warn('Cerema API failed:', e);
    await fetchDVFMicro(lat, lon);
  }
}

async function fetchDVFMicro(lat, lon) {
  // Fallback: cquest micro-API
  try {
    const url = `https://dvf-as-api.cleverapps.io/dvf/?lat=${lat}&lon=${lon}&dist=2000&nature_mutation=Vente`;
    const r = await fetch(url);
    if (!r.ok) throw new Error(r.status);
    const d = await r.json();
    const rows = d.rows || d.results || d || [];
    allData = rows.map((item,i) => ({
      _id: i,
      lat: item.latitude || item.lat,
      lon: item.longitude || item.lon,
      valeur_fonciere: item.valeur_fonciere,
      date_mutation: item.date_mutation,
      type_local: item.type_local,
      surface_reelle_bati: item.surface_reelle_bati,
      surface_terrain: item.surface_terrain,
      adresse_numero: item.numero_voie,
      adresse_nom_voie: item.voie,
      nom_commune: item.commune,
      code_postal: item.code_postal,
      nombre_pieces_principales: item.nombre_pieces_principales,
      nature_mutation: item.nature_mutation,
    })).filter(x => x.lat && x.lon && x.valeur_fonciere > 0);
    processData();
  } catch(e) {
    console.warn('Micro-API also failed:', e);
    useDemoData(lat, lon);
  }
}

// ── DEMO DATA (fallback si CORS ou dispo) ──
function useDemoData(lat, lon) {
  const types = ['Appartement','Appartement','Appartement','Maison','Terrain','Maison','Appartement','Dépendance'];
  const streets = ['Rue de Rivoli','Avenue Montaigne','Rue du Faubourg Saint-Antoine','Boulevard Haussmann','Rue de la Paix','Avenue des Champs-Élysées','Rue Saint-Honoré','Boulevard Saint-Germain','Rue de Sèvres','Avenue de l\'Opéra'];
  const demos = [];
  for (let i = 0; i < 80; i++) {
    const t = types[Math.floor(Math.random()*types.length)];
    const surf = t==='Terrain' ? 200+Math.random()*800 : 25+Math.random()*150;
    const ppm = t==='Appartement' ? 8000+Math.random()*12000 :
                t==='Maison' ? 5000+Math.random()*8000 : 400+Math.random()*2000;
    const prix = Math.round(surf * ppm / 1000) * 1000;
    const year = 2020 + Math.floor(Math.random()*5);
    const month = String(1+Math.floor(Math.random()*12)).padStart(2,'0');
    const day = String(1+Math.floor(Math.random()*28)).padStart(2,'0');
    demos.push({
      _id: i,
      lat: lat + (Math.random()-0.5)*0.04,
      lon: lon + (Math.random()-0.5)*0.06,
      valeur_fonciere: prix,
      date_mutation: `${year}-${month}-${day}`,
      type_local: t,
      surface_reelle_bati: t!=='Terrain' ? Math.round(surf) : null,
      surface_terrain: t==='Terrain' ? Math.round(surf) : null,
      adresse_numero: Math.floor(Math.random()*200)+1,
      adresse_nom_voie: streets[Math.floor(Math.random()*streets.length)],
      nom_commune: document.getElementById('searchInput').value || 'Paris',
      code_postal: '75' + String(Math.floor(Math.random()*20)+1).padStart(3,'0'),
      nombre_pieces_principales: t!=='Terrain' ? Math.floor(1+Math.random()*5) : null,
      nature_mutation: 'Vente',
      _demo: true
    });
  }
  allData = demos;
  processData(true);
}

function processData(isDemo=false) {
  applyFilters(isDemo);
}

// ── FILTERS ──
function applyFilters(isDemo=false) {
  const type = document.getElementById('fType').value;
  const year = document.getElementById('fYear').value;
  const pMin = parseFloat(document.getElementById('fPrixMin').value) || 0;
  const pMax = parseFloat(document.getElementById('fPrixMax').value) || Infinity;
  const sMin = parseFloat(document.getElementById('fSurfMin').value) || 0;
  const sMax = parseFloat(document.getElementById('fSurfMax').value) || Infinity;

  filtered = allData.filter(item => {
    if (type && item.type_local !== type) return false;
    if (year && item.date_mutation && !item.date_mutation.startsWith(year)) return false;
    if (item.valeur_fonciere < pMin || item.valeur_fonciere > pMax) return false;
    const surf = item.surface_reelle_bati || item.surface_terrain || 0;
    if (surf < sMin || surf > sMax) return false;
    return true;
  });

  sortResults();
  updateStats(isDemo);
}

function sortResults() {
  const s = document.getElementById('sortSelect').value;
  filtered = [...filtered].sort((a,b) => {
    if (s==='prix_desc') return (b.valeur_fonciere||0)-(a.valeur_fonciere||0);
    if (s==='prix_asc') return (a.valeur_fonciere||0)-(b.valeur_fonciere||0);
    if (s==='m2_desc') return (ppm2(b)||0)-(ppm2(a)||0);
    return new Date(b.date_mutation||0)-new Date(a.date_mutation||0);
  });
  renderList();
  renderMarkers();
}

// ── STATS ──
function updateStats(isDemo=false) {
  const m2vals = filtered.map(ppm2).filter(Boolean).sort((a,b)=>a-b);
  const median = m2vals.length ? m2vals[Math.floor(m2vals.length/2)] : null;
  document.getElementById('statMedian').textContent = median ? `${median.toLocaleString('fr-FR')} €` : '—';
  document.getElementById('statCount').textContent = filtered.length.toLocaleString('fr-FR');
  document.getElementById('statPeriod').textContent = isDemo ? 'données démo' : 'transactions DVF';
}

// ── RENDER LIST ──
function renderList() {
  const list = document.getElementById('resultsList');
  document.getElementById('resultsCount').innerHTML = `<strong>${filtered.length.toLocaleString('fr-FR')}</strong> transactions`;

  if (!filtered.length) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><p>Aucune transaction trouvée.<br>Modifiez vos filtres ou déplacez la carte.</p></div>`;
    return;
  }

  list.innerHTML = filtered.slice(0,100).map(item => {
    const p2 = ppm2(item);
    const surf = item.surface_reelle_bati || item.surface_terrain;
    return `
    <div class="txn-card" id="card-${item._id}" onclick="selectItem(${item._id})">
      <div class="txn-top">
        <div class="txn-price">${fmtPrice(item.valeur_fonciere)}</div>
        <div class="txn-badge ${badgeClass(item.type_local)}">${typeLabel(item.type_local)}</div>
      </div>
      <div class="txn-addr">${fmtAddr(item)}</div>
      <div class="txn-meta">
        ${surf ? `<span>📐 ${Math.round(surf)} m²</span>` : ''}
        ${item.nombre_pieces_principales ? `<span>🏠 ${item.nombre_pieces_principales} p.</span>` : ''}
        <span>📅 ${item.date_mutation ? item.date_mutation.slice(0,7) : '—'}</span>
      </div>
      ${p2 ? `<div class="txn-ppm2"><span>Prix au m²</span><strong>${p2.toLocaleString('fr-FR')} €/m²</strong></div>` : ''}
    </div>`;
  }).join('');
}

// ── MARKERS ──
function renderMarkers() {
  markerLayer.clearLayers();
  markers = [];

  filtered.slice(0, 200).forEach(item => {
    if (!item.lat || !item.lon) return;
    const tc = typeClass(item.type_local);
    const priceLabel = item.valeur_fonciere >= 1e6
      ? (item.valeur_fonciere/1e6).toFixed(1)+'M€'
      : Math.round(item.valeur_fonciere/1000)+'k€';

    const icon = L.divIcon({
      className: '',
      html: `<div class="price-marker ${tc}" id="m-${item._id}">${priceLabel}</div>`,
      iconAnchor: [20, 28]
    });

    const marker = L.marker([item.lat, item.lon], { icon })
      .addTo(markerLayer)
      .on('click', () => selectItem(item._id));

    markers.push({ id:item._id, marker });
  });
}

// ── SELECT ITEM ──
function selectItem(id) {
  selectedId = id;
  const item = filtered.find(x => x._id === id);
  if (!item) return;

  // Highlight card
  document.querySelectorAll('.txn-card').forEach(c => c.classList.remove('selected'));
  const card = document.getElementById(`card-${id}`);
  if (card) { card.classList.add('selected'); card.scrollIntoView({ behavior:'smooth', block:'nearest' }); }

  // Highlight marker
  document.querySelectorAll('.price-marker').forEach(m => m.classList.remove('selected'));
  const mEl = document.getElementById(`m-${id}`);
  if (mEl) mEl.classList.add('selected');

  // Pan map
  map.flyTo([item.lat, item.lon], Math.max(map.getZoom(), 15), { duration:0.8 });

  // Show detail
  showDetail(item);
}

function showDetail(item) {
  const p2 = ppm2(item);
  const surf = item.surface_reelle_bati || item.surface_terrain;
  document.getElementById('detailContent').innerHTML = `
    <div class="detail-grid">
      <div class="detail-main">
        <div class="detail-price">${fmtPrice(item.valeur_fonciere)}</div>
        <div class="detail-addr">${fmtAddr(item)}</div>
        <div class="detail-date">Mutation du ${fmtDate(item.date_mutation)} · ${item.nature_mutation || 'Vente'}</div>
        <div class="detail-stats">
          ${surf ? `<div class="dstat"><div class="dstat-val">${Math.round(surf)} m²</div><div class="dstat-lbl">Surface</div></div>` : ''}
          ${p2 ? `<div class="dstat"><div class="dstat-val">${p2.toLocaleString('fr-FR')} €</div><div class="dstat-lbl">Prix/m²</div></div>` : ''}
          ${item.nombre_pieces_principales ? `<div class="dstat"><div class="dstat-val">${item.nombre_pieces_principales}</div><div class="dstat-lbl">Pièces</div></div>` : ''}
          ${item.type_local ? `<div class="dstat"><div class="dstat-val" style="font-size:14px">${item.type_local}</div><div class="dstat-lbl">Type</div></div>` : ''}
        </div>
      </div>
    </div>`;
  document.getElementById('detailOverlay').classList.add('open');
}

function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('open');
  document.querySelectorAll('.txn-card').forEach(c => c.classList.remove('selected'));
  document.querySelectorAll('.price-marker').forEach(m => m.classList.remove('selected'));
  selectedId = null;
}

// ── SEARCH ──
async function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  showLoading();
  const geo = await geocode(q);
  if (!geo) {
    document.getElementById('resultsList').innerHTML = `<div class="empty"><div class="empty-icon">📍</div><p>Localisation introuvable.<br>Essayez un code postal ou une ville.</p></div>`;
    return;
  }
  map.flyTo([geo.lat, geo.lon], 14, { duration:1 });
  await fetchDVF(geo.lat, geo.lon);
}

// ── MODE & VIEW ──
function setMode(m, el) {
  currentMode = m;
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
}

function setView(v, el) {
  currentView = v;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderMarkers();
}

function showLoading() {
  document.getElementById('resultsList').innerHTML = `<div class="loading"><div class="spinner"></div>Interrogation de l'API DVF…</div>`;
  document.getElementById('resultsCount').innerHTML = `<strong>…</strong> transactions`;
  markerLayer.clearLayers();
  closeDetail();
}

// ── MAP MOVE: reload on bounds change ──
let moveTimer;
map.on('moveend', () => {
  clearTimeout(moveTimer);
  moveTimer = setTimeout(() => {
    const c = map.getCenter();
    const z = map.getZoom();
    if (z >= 12) fetchDVF(c.lat, c.lng);
  }, 800);
});

// ── INIT ──
(async () => {
  showLoading();
  const c = map.getCenter();
  await fetchDVF(c.lat, c.lng);
})();
</script>
