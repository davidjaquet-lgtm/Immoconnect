<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ImmoConnect — Messagerie</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--ink:#0F0F0E;--muted:#888780;--bg:#F5F2EC;--warm:#FEFDFB;--line:#E8E6E0;--gold:#C09B5A;--teal:#1E7A62;--blue:#185FA5;--r:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--ink);font-size:14px;height:100vh;display:flex;flex-direction:column}
nav{background:var(--ink);height:54px;display:flex;align-items:center;padding:0 24px;flex-shrink:0}
.nav-logo{font-size:18px;font-weight:600;color:#fff;text-decoration:none}
.nav-logo span{color:var(--gold)}
.nav-links{display:flex;gap:20px;align-items:center;flex:1;margin-left:24px}
.nav-links a{text-decoration:none;color:#888780;font-size:13px}
.nav-links a:hover{color:#fff}

/* LAYOUT MESSAGERIE */
.msg-layout{display:flex;flex:1;overflow:hidden}

/* LISTE CONVERSATIONS */
.conv-list{width:320px;flex-shrink:0;background:var(--warm);border-right:1px solid var(--line);display:flex;flex-direction:column}
.conv-header{padding:16px;border-bottom:1px solid var(--line)}
.conv-title{font-size:15px;font-weight:600;margin-bottom:2px}
.conv-sub{font-size:11px;color:var(--muted)}
.conv-search{padding:10px 16px;border-bottom:1px solid var(--line)}
.conv-search input{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:8px 12px;font-family:'Outfit',sans-serif;font-size:12px;color:var(--ink);outline:none}
.conv-items{flex:1;overflow-y:auto}
.conv-item{padding:14px 16px;border-bottom:1px solid var(--line);cursor:pointer;transition:background .15s;display:flex;align-items:center;gap:12px}
.conv-item:hover{background:var(--bg)}
.conv-item.active{background:#E1F5EE}
.conv-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;flex-shrink:0;color:#fff}
.av-agent{background:var(--blue)}
.av-vendeur{background:var(--teal)}
.conv-info{flex:1;min-width:0}
.conv-name{font-size:13px;font-weight:500;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv-preview{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.conv-date{font-size:10px;color:var(--muted)}
.conv-badge{background:var(--teal);color:#fff;border-radius:20px;font-size:9px;font-weight:700;padding:2px 6px}
.conv-quota{font-size:9px;color:var(--muted);padding:2px 6px;background:var(--bg);border-radius:20px;border:1px solid var(--line)}

/* ZONE CHAT */
.chat-zone{flex:1;display:flex;flex-direction:column;background:var(--bg)}
.chat-header{background:var(--warm);border-bottom:1px solid var(--line);padding:14px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.chat-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:#fff;flex-shrink:0}
.chat-info{flex:1}
.chat-name{font-size:14px;font-weight:500}
.chat-detail{font-size:11px;color:var(--muted)}
.chat-badge{font-size:10px;font-weight:600;padding:3px 10px;border-radius:20px}
.cb-ok{background:#E1F5EE;color:var(--teal)}
.cb-warn{background:#FAEEDA;color:#854F0B}
.cb-block{background:#FAECE7;color:#993C1D}

.chat-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px}
.msg-bubble{max-width:70%;padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.6}
.msg-out{align-self:flex-end;background:var(--ink);color:#fff;border-bottom-right-radius:4px}
.msg-in{align-self:flex-start;background:var(--warm);border:1px solid var(--line);border-bottom-left-radius:4px}
.msg-time{font-size:10px;opacity:.6;margin-top:4px}
.msg-date-sep{text-align:center;font-size:11px;color:var(--muted);padding:8px;background:rgba(15,15,14,.04);border-radius:20px;align-self:center}

.chat-input-zone{background:var(--warm);border-top:1px solid var(--line);padding:14px 20px;flex-shrink:0}
.quota-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;font-size:11px;color:var(--muted)}
.quota-pill{font-size:10px;font-weight:600;padding:3px 10px;border-radius:20px}
.qp-ok{background:#E1F5EE;color:var(--teal)}
.qp-warn{background:#FAEEDA;color:#854F0B}
.qp-block{background:#FAECE7;color:#993C1D}
.input-row{display:flex;gap:10px;align-items:flex-end}
.msg-textarea{flex:1;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:10px 14px;font-family:'Outfit',sans-serif;font-size:13px;color:var(--ink);outline:none;resize:none;min-height:42px;max-height:120px;line-height:1.5}
.msg-textarea:focus{border-color:var(--ink)}
.btn-send{padding:10px 18px;border-radius:8px;border:none;background:var(--ink);color:#fff;font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;cursor:pointer;flex-shrink:0}
.btn-send:hover{opacity:.85}
.btn-send:disabled{opacity:.4;cursor:not-allowed}

/* VIDE */
.chat-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);font-size:13px;gap:12px}
.chat-empty-icon{font-size:48px}

/* BLOCAGE QUOTA */
.quota-block{background:#FAECE7;border:1px solid rgba(153,60,29,.2);border-radius:8px;padding:14px 16px;margin-bottom:10px;font-size:12px;line-height:1.6;color:#712B13}

.spin{width:24px;height:24px;border:3px solid var(--line);border-top-color:var(--teal);border-radius:50%;animation:spin 1s linear infinite;margin:40px auto}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:700px){.conv-list{width:100%;height:40vh;border-right:none;border-bottom:1px solid var(--line)}.msg-layout{flex-direction:column}}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">Immo<span>Connect</span></a>
  <div class="nav-links">
    <a href="connexion.html">Mon espace</a>
    <a href="index.html">Accueil</a>
  </div>
</nav>

<div class="msg-layout">
  <!-- LISTE CONVERSATIONS -->
  <div class="conv-list">
    <div class="conv-header">
      <div class="conv-title">💬 Messagerie</div>
      <div class="conv-sub" id="user-role-label">Chargement…</div>
    </div>
    <div class="conv-search">
      <input type="text" id="search-conv" placeholder="Rechercher une conversation…" oninput="filtrerConvs()">
    </div>
    <div class="conv-items" id="conv-list">
      <div class="spin"></div>
    </div>
  </div>

  <!-- CHAT -->
  <div class="chat-zone" id="chat-zone">
    <div class="chat-empty">
      <div class="chat-empty-icon">💬</div>
      <div>Sélectionnez une conversation</div>
    </div>
  </div>
</div>

<script>
const SB_URL = 'https://zxxhyefajfwqcxcfxpmg.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp4eGh5ZWZhamZ3cWN4Y2Z4cG1nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MjYwNDAsImV4cCI6MjA5MTUwMjA0MH0.jB8Z_9eT9lYkqxUUD0G001Y87iSAv94fSu_gVOdqa-A';
const { createClient } = supabase;
const db = createClient(SB_URL, SB_KEY);

// Limites par forfait agent
const FORFAITS = {
  starter:    { contacts_semaine: 10, label: 'Starter' },
  pro:        { contacts_semaine: 15, label: 'Pro' },
  expert:     { contacts_semaine: 30, label: 'Expert' },
  platinium:  { contacts_semaine: 999, label: 'Platinium' }
};

var currentUser = null;
var currentRole = 'vendeur';
var currentForfait = 'starter';
var allConvs = [];
var currentConvId = null;
var msgInterval = null;

// ── INIT ──
(async function() {
  var { data: { session } } = await db.auth.getSession();
  if (!session) { window.location.href = 'connexion.html'; return; }
  currentUser = session.user;
  var meta = currentUser.user_metadata || {};
  var profils = meta.profils || ['vendeur'];
  currentRole = profils.includes('agent') ? 'agent' : 'vendeur';
  currentForfait = meta.forfait_agent || 'starter';

  document.getElementById('user-role-label').textContent =
    currentRole === 'agent' ? '🤝 Agent — Forfait ' + FORFAITS[currentForfait].label : '🏠 Vendeur';

  await chargerConversations();
})();

// ── CHARGER CONVERSATIONS ──
async function chargerConversations() {
  var field = currentRole === 'agent' ? 'email_agent' : 'email_vendeur';
  var { data: convs } = await db.from('conversations')
    .select('*, annonces_vendeurs(titre, type_bien, ville, surface, prix)')
    .eq(field, currentUser.email)
    .order('created_at', { ascending: false });

  allConvs = convs || [];

  // Compter messages non lus par conversation
  for (var i = 0; i < allConvs.length; i++) {
    var { count } = await db.from('messages_conversation')
      .select('*', { count: 'exact', head: true })
      .eq('conversation_id', allConvs[i].id)
      .eq('lu', false)
      .neq('expediteur_email', currentUser.email);
    allConvs[i].non_lus = count || 0;
  }

  afficherListeConvs(allConvs);
}

// ── AFFICHER LISTE ──
function afficherListeConvs(convs) {
  var html = '';
  if (!convs.length) {
    html = '<div style="padding:24px;text-align:center;color:var(--muted);font-size:12px">Aucune conversation</div>';
    document.getElementById('conv-list').innerHTML = html;
    return;
  }

  convs.forEach(function(c) {
    var nom = currentRole === 'agent' ? c.email_vendeur.split('@')[0] : c.email_agent ? c.email_agent.split('@')[0] : 'Agent';
    var bien = c.annonces_vendeurs;
    var preview = bien ? (bien.type_bien || 'Bien') + ' · ' + (bien.ville || '') : '—';
    var avatar = currentRole === 'agent' ? 'av-vendeur' : 'av-agent';
    var initiale = nom.charAt(0).toUpperCase();
    var date = new Date(c.created_at).toLocaleDateString('fr-FR', { day:'2-digit', month:'short' });

    html += '<div class="conv-item' + (c.id === currentConvId ? ' active' : '') + '" onclick="ouvrirConv(\'' + c.id + '\')">';
    html += '<div class="conv-avatar ' + avatar + '">' + initiale + '</div>';
    html += '<div class="conv-info">';
    html += '<div class="conv-name">' + nom + '</div>';
    html += '<div class="conv-preview">' + preview + '</div>';
    html += '</div>';
    html += '<div class="conv-meta">';
    html += '<div class="conv-date">' + date + '</div>';
    if (c.non_lus > 0) html += '<div class="conv-badge">' + c.non_lus + '</div>';
    html += '</div></div>';
  });

  document.getElementById('conv-list').innerHTML = html;
}

// ── OUVRIR CONVERSATION ──
async function ouvrirConv(convId) {
  currentConvId = convId;
  var conv = allConvs.find(function(c){ return c.id === convId; });
  if (!conv) return;

  // Mettre à jour la liste
  afficherListeConvs(allConvs);

  // Marquer comme lu
  await db.from('messages_conversation')
    .update({ lu: true })
    .eq('conversation_id', convId)
    .neq('expediteur_email', currentUser.email);

  // Charger les messages
  await afficherChat(conv);

  // Rafraîchir automatiquement
  if (msgInterval) clearInterval(msgInterval);
  msgInterval = setInterval(function() { rafraichirMessages(convId); }, 5000);
}

// ── AFFICHER CHAT ──
async function afficherChat(conv) {
  var bien = conv.annonces_vendeurs;
  var nomInterlocuteur = currentRole === 'agent'
    ? conv.email_vendeur.split('@')[0]
    : (conv.email_agent || 'Agent').split('@')[0];

  // Quota agent
  var quotaHtml = '';
  var peutEnvoyer = true;
  if (currentRole === 'agent') {
    var semaine = getSemaine();
    var { data: quota } = await db.from('contacts_semaine')
      .select('nb_contacts').eq('agent_id', currentUser.id).eq('semaine', semaine).single();
    var nbUtilises = quota ? quota.nb_contacts : 0;
    var max = FORFAITS[currentForfait].contacts_semaine;

    if (!conv.contact_consomme) {
      // Ce contact n'est pas encore consommé
      if (nbUtilises >= max) {
        peutEnvoyer = false;
        quotaHtml = '<div class="quota-block">⚠️ Vous avez atteint votre limite de <strong>' + max + ' contacts/semaine</strong> (forfait ' + FORFAITS[currentForfait].label + '). Votre quota se renouvelle lundi. <a href="forfaits.html" style="color:var(--teal)">Passer au forfait supérieur →</a></div>';
      }
    }
  }

  var html = '';
  html += '<div class="chat-header">';
  html += '<div class="chat-avatar ' + (currentRole === 'agent' ? 'av-vendeur' : 'av-agent') + '">' + nomInterlocuteur.charAt(0).toUpperCase() + '</div>';
  html += '<div class="chat-info"><div class="chat-name">' + nomInterlocuteur + '</div>';
  html += '<div class="chat-detail">' + (bien ? (bien.type_bien||'Bien') + ' · ' + (bien.surface||'—') + ' m² · ' + (bien.ville||'') + (bien.prix ? ' · ' + Math.round(bien.prix).toLocaleString('fr-FR') + ' €' : '') : '') + '</div></div>';
  if (currentRole === 'agent') {
    var semaine2 = getSemaine();
    var { data: q2 } = await db.from('contacts_semaine')
      .select('nb_contacts').eq('agent_id', currentUser.id).eq('semaine', semaine2).single();
    var used = q2 ? q2.nb_contacts : 0;
    var max2 = FORFAITS[currentForfait].contacts_semaine;
    var left = max2 - used;
    var cls = left > 5 ? 'cb-ok' : left > 0 ? 'cb-warn' : 'cb-block';
    html += '<div class="chat-badge ' + cls + '">' + (max2 === 999 ? '∞ contacts' : left + ' contacts restants cette semaine') + '</div>';
  }
  html += '</div>';

  // Messages
  var { data: msgs } = await db.from('messages_conversation')
    .select('*').eq('conversation_id', conv.id)
    .order('created_at', { ascending: true });

  html += '<div class="chat-messages" id="chat-msgs">';
  if (!msgs || !msgs.length) {
    html += '<div class="msg-date-sep">Début de la conversation</div>';
  } else {
    var lastDate = '';
    msgs.forEach(function(m) {
      var d = new Date(m.created_at).toLocaleDateString('fr-FR', { day:'2-digit', month:'long', year:'numeric' });
      if (d !== lastDate) {
        html += '<div class="msg-date-sep">' + d + '</div>';
        lastDate = d;
      }
      var isOut = m.expediteur_email === currentUser.email;
      var heure = new Date(m.created_at).toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });
      html += '<div class="msg-bubble ' + (isOut ? 'msg-out' : 'msg-in') + '">';
      html += m.contenu.replace(/\n/g, '<br>');
      html += '<div class="msg-time">' + heure + '</div></div>';
    });
  }
  html += '</div>';

  // Zone saisie
  html += '<div class="chat-input-zone">';
  if (currentRole === 'agent') {
    html += '<div class="quota-bar"><span>Quota semaine</span>';
    html += '<span class="quota-pill ' + (peutEnvoyer ? 'qp-ok' : 'qp-block') + '">' +
      (FORFAITS[currentForfait].contacts_semaine === 999 ? 'Illimité' :
       (FORFAITS[currentForfait].contacts_semaine - (q2 ? q2.nb_contacts : 0)) + ' / ' + FORFAITS[currentForfait].contacts_semaine + ' restants') + '</span>';
    html += '</div>';
  }
  if (quotaHtml) html += quotaHtml;
  if (peutEnvoyer) {
    html += '<div class="input-row">';
    html += '<textarea class="msg-textarea" id="msg-input" placeholder="Écrivez votre message…" rows="1" onkeydown="sendOnEnter(event)"></textarea>';
    html += '<button class="btn-send" onclick="envoyerMessage()">Envoyer →</button>';
    html += '</div>';
  }
  html += '</div>';

  document.getElementById('chat-zone').innerHTML = html;

  // Scroll en bas
  var msgBox = document.getElementById('chat-msgs');
  if (msgBox) msgBox.scrollTop = msgBox.scrollHeight;
}

// ── ENVOYER MESSAGE ──
async function envoyerMessage() {
  var input = document.getElementById('msg-input');
  var contenu = input ? input.value.trim() : '';
  if (!contenu) return;

  var conv = allConvs.find(function(c){ return c.id === currentConvId; });
  if (!conv) return;

  var btn = document.querySelector('.btn-send');
  if (btn) btn.disabled = true;

  // Si agent et premier message sur cette conversation → consommer le contact
  if (currentRole === 'agent' && !conv.contact_consomme) {
    var semaine = getSemaine();
    // Incrémenter le compteur
    var { data: existing } = await db.from('contacts_semaine')
      .select('*').eq('agent_id', currentUser.id).eq('semaine', semaine).single();
    if (existing) {
      await db.from('contacts_semaine')
        .update({ nb_contacts: existing.nb_contacts + 1 })
        .eq('id', existing.id);
    } else {
      await db.from('contacts_semaine')
        .insert({ agent_id: currentUser.id, semaine: semaine, nb_contacts: 1 });
    }
    // Marquer le contact comme consommé
    await db.from('conversations')
      .update({ contact_consomme: true, date_contact: new Date().toISOString() })
      .eq('id', currentConvId);
    conv.contact_consomme = true;
  }

  // Insérer le message
  await db.from('messages_conversation').insert({
    conversation_id: currentConvId,
    expediteur_email: currentUser.email,
    expediteur_role: currentRole,
    contenu: contenu,
    lu: false
  });

  if (input) input.value = '';
  await afficherChat(conv);
}

// ── NOUVELLE CONVERSATION (depuis espace agent) ──
async function creerConversation(annonceId, emailVendeur) {
  // Vérifier si conversation existe déjà
  var { data: existing } = await db.from('conversations')
    .select('id').eq('agent_id', currentUser.id).eq('annonce_id', annonceId).single();
  if (existing) { currentConvId = existing.id; return existing.id; }

  var { data: conv } = await db.from('conversations').insert({
    agent_id: currentUser.id,
    annonce_id: annonceId,
    email_agent: currentUser.email,
    email_vendeur: emailVendeur,
    contact_consomme: false
  }).select().single();

  return conv ? conv.id : null;
}

// ── RAFRAÎCHIR MESSAGES ──
async function rafraichirMessages(convId) {
  if (convId !== currentConvId) return;
  var conv = allConvs.find(function(c){ return c.id === convId; });
  if (conv) await afficherChat(conv);
}

// ── FILTRER CONVERSATIONS ──
function filtrerConvs() {
  var q = document.getElementById('search-conv').value.toLowerCase();
  var filtered = allConvs.filter(function(c) {
    var bien = c.annonces_vendeurs;
    var txt = (c.email_vendeur + c.email_agent + (bien ? bien.ville + bien.type_bien : '')).toLowerCase();
    return txt.includes(q);
  });
  afficherListeConvs(filtered);
}

// ── UTILS ──
function getSemaine() {
  var d = new Date();
  var jan1 = new Date(d.getFullYear(), 0, 1);
  var week = Math.ceil(((d - jan1) / 86400000 + jan1.getDay() + 1) / 7);
  return d.getFullYear() + '-W' + String(week).padStart(2, '0');
}

function sendOnEnter(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); envoyerMessage(); }
}
</script>
</body>
</html>
